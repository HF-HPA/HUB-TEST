<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Merchandising Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- App Icon -->
  <link rel="icon" href="hf_logo.png" />

  <!-- =====================================================
       GLOBAL THEME & DESIGN SYSTEM
       ===================================================== -->
  <style>
    :root{
      --bg:#020617;
      --bg-alt:#02040a;
      --card-bg:rgba(15,23,42,.85);
      --card-glass:rgba(15,23,42,.75);
      --text:#e5e7eb;
      --heading:#f9fafb;
      --muted:#9ca3af;

      --accent:#22d3ee;
      --accent-strong:#06b6d4;

      --good:#22c55e;
      --warn:#facc15;
      --bad:#ef4444;

      --border-soft:rgba(148,163,184,.25);
      --border-subtle:rgba(148,163,184,.4);

      --radius-sm:8px;
      --radius-md:12px;
      --radius-lg:18px;
      --radius-pill:999px;

      --shadow-soft:0 18px 48px rgba(0,0,0,.6);
      --transition-fast:.18s ease;
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ height:100%; }

    body{
      font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:
        linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.9)),
        url("philo.jpg") center/cover fixed;
      color:var(--text);
      min-height:100vh;
    }

    /* =====================================================
       LAYOUT SHELL
       ===================================================== */
    .app-shell{
      padding:16px;
      display:flex;
      justify-content:center;
    }

    .app-inner{
      width:100%;
      max-width:1280px;
      background:linear-gradient(135deg, rgba(15,23,42,.95), rgba(15,23,42,.85));
      border-radius:24px;
      border:1px solid var(--border-subtle);
      box-shadow:var(--shadow-soft);
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .hidden{ display:none !important; }

    /* =====================================================
       TYPOGRAPHY
       ===================================================== */
    h1,h2,h3{
      color:var(--heading);
      font-weight:800;
      letter-spacing:.04em;
    }

    .subtitle{
      color:var(--muted);
      font-size:.9rem;
    }

    /* =====================================================
       GLASS PANELS
       ===================================================== */
    .glass-panel{
      background:var(--card-glass);
      border-radius:var(--radius-lg);
      border:1px solid var(--border-soft);
      box-shadow:var(--shadow-soft);
      padding:14px;
      backdrop-filter: blur(14px);
    }

    /* =====================================================
       TABS & BUTTONS
       ===================================================== */
    .tabs{
      display:flex;
      gap:8px;
      overflow-x:auto;
      scrollbar-width:none;
    }
    .tabs::-webkit-scrollbar{ display:none; }

    .tab{
      padding:8px 16px;
      border-radius:var(--radius-pill);
      background:rgba(15,23,42,.6);
      border:1px solid transparent;
      color:var(--muted);
      cursor:pointer;
      transition:all var(--transition-fast);
      white-space:nowrap;
      font-size:.85rem;
      font-weight:700;
    }
    .tab:hover{
      background:rgba(15,23,42,.9);
      color:var(--heading);
      transform:translateY(-1px);
    }
    .tab.active{
      background:linear-gradient(135deg, var(--accent-strong), #3b82f6);
      color:#020617;
      box-shadow:0 10px 28px rgba(34,211,238,.45);
    }

    .popup-close{
      background:linear-gradient(135deg, var(--accent-strong), #3b82f6);
      color:#020617;
      border:none;
      border-radius:var(--radius-pill);
      padding:8px 14px;
      font-weight:800;
      cursor:pointer;
    }

    /* =====================================================
       CARD GRID (HF, Pests, Perennials)
       ===================================================== */
    .card-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
    }
    @media(max-width:900px){
      .card-grid{ grid-template-columns:repeat(2,minmax(0,1fr)); }
    }
    @media(max-width:520px){
      .card-grid{ grid-template-columns:1fr; }
    }

    .card{
      background:var(--card-glass);
      border:1px solid var(--border-soft);
      border-radius:var(--radius-md);
      padding:12px;
      cursor:pointer;
      transition:all var(--transition-fast);
    }
    .card:hover{
      border-color:rgba(34,211,238,.6);
      transform:translateY(-2px);
    }

    .card-title{
      font-weight:900;
      color:var(--heading);
    }
    .card-sub{
      color:var(--muted);
      font-size:.85rem;
      margin-top:4px;
    }

    /* =====================================================
       FILTER CHIPS
       ===================================================== */
    .filter-bar{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .filter-chip{
      padding:6px 12px;
      border-radius:var(--radius-pill);
      border:1px solid var(--border-soft);
      background:rgba(15,23,42,.55);
      color:var(--muted);
      cursor:pointer;
      font-size:.78rem;
    }
    .filter-chip.active{
      background:linear-gradient(135deg, var(--accent-strong), #3b82f6);
      color:#020617;
      border-color:transparent;
    }

    /* =====================================================
       PRINT MODE (CARE CARDS)
       ===================================================== */
    @media print{
      body{ background:#fff !important; color:#000 !important; }
      .tabs, .filter-bar, header, nav, footer{ display:none !important; }
      .glass-panel, .card{ box-shadow:none !important; }
    }
  </style>
</head>
<body>

<div class="app-shell">
  <div class="app-inner">

    <script>
/* =====================================================
   SEGMENT 3 — APP STATE + AUTH + NAVIGATION
   ===================================================== */

/* -----------------------------
   GLOBAL STATE
   ----------------------------- */
const App = {
  user: null,
  view: "splash"
};

const VIEWS = ["splash","login","map","hf","hpa","training","admin"];

/* -----------------------------
   HELPERS
   ----------------------------- */
const $ = (id)=> document.getElementById(id);

function showView(view){
  VIEWS.forEach(v=>{
    const el = $("view-" + v);
    if(el) el.classList.toggle("hidden", v !== view);
  });

  document.querySelectorAll(".tab[data-view]").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.view === view);
  });

  App.view = view;
  try{ sessionStorage.setItem("hub_view", view); }catch{}
}

function setUserPill(name){
  const pill = $("userPill");
  if(pill) pill.textContent = name || "User";
}

/* -----------------------------
   SPLASH → LOGIN
   ----------------------------- */
(function wireSplash(){
  const btn = $("splashEnter");
  if(!btn) return;

  btn.addEventListener("click", ()=>{
    showView("login");
  });

  btn.addEventListener("keydown", (e)=>{
    if(e.key === "Enter" || e.key === " "){
      e.preventDefault();
      showView("login");
    }
  });

  btn.setAttribute("tabindex","0");
})();

/* -----------------------------
   LOGIN (SIMPLE, CSV‑READY)
   ----------------------------- */
async function loadUsers(){
  try{
    const res = await fetch("users.csv", { cache:"no-store" });
    if(!res.ok) throw new Error("no csv");
    const txt = await res.text();
    const rows = txt.split("\n").map(r=>r.split(","));
    const header = rows[0].map(h=>h.trim().toLowerCase());
    const uIdx = header.indexOf("username");
    const pIdx = header.indexOf("password");

    return rows.slice(1).map(r=>({
      username:(r[uIdx]||"").trim().toLowerCase(),
      password:(r[pIdx]||"").trim()
    })).filter(u=>u.username && u.password);
  }catch{
    // fallback demo user
    return [{ username:"demo", password:"demo" }];
  }
}

async function doLogin(){
  const user = $("loginUser")?.value.trim().toLowerCase();
  const pass = $("loginPass")?.value.trim();
  const err  = $("loginError");
  if(err) err.textContent = "";

  if(!user || !pass){
    if(err) err.textContent = "Enter username and password.";
    return;
  }

  const users = await loadUsers();
  const match = users.find(u=>u.username===user && u.password===pass);

  if(!match){
    if(err) err.textContent = "Invalid credentials.";
    return;
  }

  App.user = { username:user };
  try{ sessionStorage.setItem("hub_user", JSON.stringify(App.user)); }catch{}

  $("topbar")?.classList.remove("hidden");
  $("globalTabs")?.classList.remove("hidden");
  setUserPill(user);

  const lastView = sessionStorage.getItem("hub_view");
  showView(VIEWS.includes(lastView) ? lastView : "map");
}

$("loginBtn")?.addEventListener("click", doLogin);
$("loginPass")?.addEventListener("keydown", e=>{
  if(e.key==="Enter") doLogin();
});

/* -----------------------------
   LOGOUT
   ----------------------------- */
$("logoutBtn")?.addEventListener("click", ()=>{
  App.user = null;
  try{
    sessionStorage.removeItem("hub_user");
    sessionStorage.removeItem("hub_view");
  }catch{}

  $("topbar")?.classList.add("hidden");
  $("globalTabs")?.classList.add("hidden");

  showView("splash");
});

/* -----------------------------
   GLOBAL NAVIGATION
   ----------------------------- */
document.querySelectorAll(".tab[data-view]").forEach(btn=>{
  if(btn.dataset.bound==="1") return;
  btn.dataset.bound="1";

  btn.addEventListener("click", ()=>{
    showView(btn.dataset.view);
  });
});

/* -----------------------------
   HF TAB SWITCHING
   ----------------------------- */
document.querySelectorAll("[data-hf-tab]").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll("[data-hf-tab]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    $("hf-guidelines")?.classList.toggle("hidden", btn.dataset.hfTab!=="guidelines");
    $("hf-care")?.classList.toggle("hidden", btn.dataset.hfTab!=="care");
  };
});

document.querySelectorAll("[data-hf-care]").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll("[data-hf-care]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    $("hf-plants")?.classList.toggle("hidden", btn.dataset.hfCare!=="plants");
    $("hf-pests")?.classList.toggle("hidden", btn.dataset.hfCare!=="pests");
  };
});

/* -----------------------------
   HPA TAB SWITCHING
   ----------------------------- */
document.querySelectorAll("[data-hpa-tab]").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll("[data-hpa-tab]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    $("hpa-guidelines")?.classList.toggle("hidden", btn.dataset.hpaTab!=="guidelines");
    $("hpa-care")?.classList.toggle("hidden", btn.dataset.hpaTab!=="care");
  };
});

document.querySelectorAll("[data-hpa-care]").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll("[data-hpa-care]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    $("hpa-plants")?.classList.toggle("hidden", btn.dataset.hpaCare!=="plants");
    $("hpa-pests")?.classList.toggle("hidden", btn.dataset.hpaCare!=="pests");
  };
});

/* -----------------------------
   SESSION RESTORE
   ----------------------------- */
(function restoreSession(){
  try{
    const raw = sessionStorage.getItem("hub_user");
    if(raw){
      App.user = JSON.parse(raw);
      $("topbar")?.classList.remove("hidden");
      $("globalTabs")?.classList.remove("hidden");
      setUserPill(App.user.username);

      const v = sessionStorage.getItem("hub_view");
      showView(VIEWS.includes(v) ? v : "map");
      return;
    }
  }catch{}

  showView("splash");
})();
</script>

<!-- Leaflet -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* =====================================================
   WEEKLY RESET (EVERY MONDAY)
   ===================================================== */

// Returns YYYY-MM-DD for most recent Monday
function mondayKey(d = new Date()){
  const date = new Date(d);
  const day = date.getDay(); // 0=Sun,1=Mon
  const diff = (day === 0 ? -6 : 1) - day;
  date.setDate(date.getDate() + diff);
  return date.toISOString().slice(0,10);
}

const WEEK_KEY_STORAGE = "hub_last_week_key_v1";
const STORE_STATE_KEY  = "hub_store_state_v1";

// Reset local map state once per new week
(function weeklyMapReset(){
  try{
    const currentWeek = mondayKey();
    const lastWeek = localStorage.getItem(WEEK_KEY_STORAGE);

    if(lastWeek !== currentWeek){
      console.log("🔄 Weekly reset — clearing map state");
      localStorage.removeItem(STORE_STATE_KEY);
      localStorage.setItem(WEEK_KEY_STORAGE, currentWeek);
    }
  }catch(e){
    console.warn("Weekly reset failed", e);
  }
})();
</script>

<script>
/* =====================================================
   LIVE MAP MODULE
   ===================================================== */

const LiveMap = (() => {
  let map = null;
  let markers = new Map();
  let stores = [];
  let started = false;

  /* -----------------------------
     Helpers
     ----------------------------- */
  const parseCSV = (text)=>{
    return text.trim().split("\n").map(r=>r.split(","));
  };

  function mapVisible(){
    const v = document.getElementById("view-map");
    return v && !v.classList.contains("hidden");
  }

  /* -----------------------------
     Load stores.csv
     Expected columns:
     store_id,store_name,lat,lon,city,state
     ----------------------------- */
  async function loadStores(){
    try{
      const res = await fetch("stores.csv", { cache:"no-store" });
      if(!res.ok) throw new Error("Missing stores.csv");
      const rows = parseCSV(await res.text());

      const header = rows[0].map(h=>h.trim().toLowerCase());
      const idx = (n)=> header.indexOf(n);

      stores = rows.slice(1).map(r=>({
        id: r[idx("store_id")]?.trim(),
        name: r[idx("store_name")]?.trim(),
        lat: parseFloat(r[idx("lat")]),
        lon: parseFloat(r[idx("lon")]),
        city: r[idx("city")]?.trim(),
        state: r[idx("state")]?.trim()
      })).filter(s=>s.id && !isNaN(s.lat) && !isNaN(s.lon));
    }catch(e){
      console.warn("Using fallback stores", e);
      stores = [
        { id:"1001", name:"Demo Store", lat:41.88, lon:-87.63, city:"Chicago", state:"IL" }
      ];
    }
  }

  /* -----------------------------
     Map init
     ----------------------------- */
  function ensureMap(){
    if(map) return;
    const el = document.getElementById("storeMap");
    if(!el) return;

    map = L.map(el, { preferCanvas:true });
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom:19
    }).addTo(map);
  }

  /* -----------------------------
     Marker rendering
     ----------------------------- */
  function markerHTML(){
    return `<div style="
      width:16px;
      height:16px;
      border-radius:50%;
      background:#ef4444;
      border:2px solid #fff;
      box-shadow:0 6px 16px rgba(0,0,0,.6);
    "></div>`;
  }

  function renderMarkers(){
    markers.forEach(m=>map.removeLayer(m));
    markers.clear();

    const bounds = [];

    stores.forEach(s=>{
      const icon = L.divIcon({
        className:"",
        html: markerHTML(),
        iconSize:[16,16],
        iconAnchor:[8,8]
      });

      const m = L.marker([s.lat, s.lon], { icon }).addTo(map);
      m.bindTooltip(`${s.name} (${s.id})`, { direction:"top" });
      m.on("click", ()=> selectStore(s));
      markers.set(s.id, m);
      bounds.push([s.lat, s.lon]);
    });

    if(bounds.length){
      map.fitBounds(bounds, { padding:[20,20] });
    }
  }

  /* -----------------------------
     Store selection (placeholder)
     ----------------------------- */
  function selectStore(store){
    console.log("Selected store:", store);
    // Future: open side panel, load checklist, issues, etc.
  }

  /* -----------------------------
     Start map
     ----------------------------- */
  async function start(){
    if(started) return;
    started = true;

    ensureMap();
    await loadStores();
    renderMarkers();

    setTimeout(()=> map.invalidateSize(), 100);
  }

  /* -----------------------------
     Hook view visibility
     ----------------------------- */
  function hookView(){
    const v = document.getElementById("view-map");
    if(!v) return;

    const obs = new MutationObserver(()=>{
      if(mapVisible()){
        start();
        setTimeout(()=> map.invalidateSize(), 80);
      }
    });

    obs.observe(v, { attributes:true, attributeFilter:["class"] });
  }

  return { start, hookView };
})();

/* -----------------------------
   Boot map module
   ----------------------------- */
(function bootMap(){
  LiveMap.hookView();
  if(!document.getElementById("view-map")?.classList.contains("hidden")){
    LiveMap.start();
  }
})();
</script>
<script>
/* =====================================================
   SEGMENT 5 — HF CORE (SEASONAL + GUIDELINES)
   ===================================================== */

/* -----------------------------
   CSV Loader (shared)
   ----------------------------- */
async function loadCsvSafe(url){
  try{
    const res = await fetch(url, { cache:"no-store" });
    if(!res.ok) throw new Error("missing");
    const text = await res.text();
    return text.trim().split("\n").map(r=>r.split(","));
  }catch{
    return null;
  }
}

function esc(s){
  return String(s ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

/* =====================================================
   HF SEASONAL CALLOUT BANNER
   ===================================================== */

const HF_SEASONAL = {
  1:  "Winter: Inspect overwintered perennials and remove damaged material.",
  2:  "Late Winter: Prepare racks and plan early spring layouts.",

function injectHFSeasonalBanner(){
  const hf = document.getElementById("view-hf");
  if(!hf || document.getElementById("hfSeasonal")) return;

  const month = new Date().getMonth() + 1;
  const msg = HF_SEASONAL[month];
  if(!msg) return;

  const banner = document.createElement("div");
  banner.id = "hfSeasonal";
  banner.className = "hf-seasonal";
  banner.innerHTML = `<strong>Seasonal Focus</strong> — ${msg}`;

}

/* =====================================================
   HF GUIDELINES RENDERER
   ===================================================== */
/*
  Expected CSV formats (flexible):
  category,text
  OR
  category,guideline
*/

async function renderHFGuideLines(){
  const mount = document.getElementById("hf-guidelines");
  if(!mount) return;

  const rows = await loadCsvSafe("hf_guidelines.csv");
  if(!rows || rows.length < 2){
    mount.innerHTML = `
      <div class="glass-panel">
        No HF guidelines available.
      </div>
    `;
    return;
  }

  const header = rows[0].map(h=>h.toLowerCase().trim());
  const catIdx = header.indexOf("category") >= 0 ? header.indexOf("category") : 0;
  const txtIdx =
    header.indexOf("text") >= 0 ? header.indexOf("text") :
    header.indexOf("guideline") >= 0 ? header.indexOf("guideline") : 1;

  const groups = {};
  rows.slice(1).forEach(r=>{
    const cat = (r[catIdx] || "General").trim();
    const txt = (r[txtIdx] || "").trim();
    if(!txt) return;
    if(!groups[cat]) groups[cat] = [];
    groups[cat].push(txt);
  });

  mount.innerHTML = Object.entries(groups).map(([cat,items])=>{
    return `
      <div class="glass-panel" style="margin-bottom:12px;">
        <div class="card-title" style="letter-spacing:.12em; text-transform:uppercase; font-size:.8rem;">
          ${esc(cat)}
        </div>
        <ul style="margin-top:8px; margin-left:16px; line-height:1.5;">
          ${items.map(i=>`<li>${esc(i)}</li>`).join("")}
        </ul>
      </div>
    `;
  }).join("");
}

<script>
/* =====================================================
   SEGMENT 6 — HF PERENNIALS (CSV + FILTERS + PRINT)
   ===================================================== */

/* =====================================================
   SMART FILTER DEFINITIONS (parsed from care text)
   ===================================================== */
const HF_SMART_FILTERS = [
  { id:"sun", label:"Full Sun",   match:/full sun/i },
  { id:"shade", label:"Shade",    match:/shade/i },
  { id:"lowwater", label:"Low Water", match:/low water|drought/i },
  { id:"moist", label:"Moist Soil", match:/moist|consistent moisture/i },
  { id:"native", label:"Native",  match:/native/i },
  { id:"pollinator", label:"Pollinator", match:/pollinator|butterfly|monarch|bee/i }
];

/* =====================================================
   PERENNIAL RENDERER
   ===================================================== */
async function renderHFPerennials(){
  const mount = document.getElementById("hf-plants");
  if(!mount) return;

  const rows = await loadCsvSafe("hf_perennials.csv");
  if(!rows || rows.length < 2){
    mount.innerHTML = `<div class="glass-panel">No perennial data available.</div>`;
    return;
  }

  const header = rows[0].map(h=>h.toLowerCase().trim());
  const idx = (n)=>header.indexOf(n);

  const items = rows.slice(1).map((r,i)=>({
    id: r[idx("id")] || `perennial:${i}`,
    common: r[idx("common_name")] || "",
    sci: r[idx("scientific_name")] || "",
    care: r[idx("care")] || ""
  })).filter(x=>x.common);

  let activeFilters = new Set();

  /* =====================================================
     UI SHELL
     ===================================================== */
  mount.innerHTML = `
    <div class="hf-toolbar">
      <div class="search-wrap">
        <input id="hfPerennialSearch" type="search" placeholder="Search perennials…" />
      </div>

      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <label class="pill-toggle">
          <input type="radio" name="hfSearchMode" value="both" checked /> Both
        </label>
        <label class="pill-toggle">
          <input type="radio" name="hfSearchMode" value="common" /> Common
        </label>
        <label class="pill-toggle">
          <input type="radio" name="hfSearchMode" value="scientific" /> Scientific
        </label>
      </div>

      <div id="hfPerennialCount" class="hf-count">${items.length} items</div>
    </div>

    <div class="filter-bar" id="hfPerennialFilters">
      ${HF_SMART_FILTERS.map(f=>`
        <div class="filter-chip" data-filter="${f.id}">${f.label}</div>
      `).join("")}
    </div>

    <div id="hfPerennialGrid" class="card-grid"></div>
  `;

  const grid   = document.getElementById("hfPerennialGrid");
  const search = document.getElementById("hfPerennialSearch");
  const count  = document.getElementById("hfPerennialCount");

  const searchMode = () =>
    [...document.querySelectorAll('input[name="hfSearchMode"]')]
      .find(r=>r.checked)?.value || "both";

  /* =====================================================
     MODAL (PRINTABLE CARE CARD)
     ===================================================== */
  function openPerennialModal(it){
    const bodyHtml = `
      <div class="glass-panel">
        <div style="font-weight:900;margin-bottom:6px;">Care</div>
        <div style="line-height:1.5;">${esc(it.care)}</div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:12px;">
        <button class="popup-close" onclick="window.print()">🖨 Print Care Card</button>
      </div>
    `;

    // Prefer enhanced HF modal if present
    if(typeof openHFModal === "function"){
      openHFModal({
        title: it.common,
        sub: it.sci,
        bodyHtml,
        favId: it.id,
        footer: "HF • Perennials"
      });
      return;
    }

    // Fallback modal
    let bd = document.getElementById("hfPerennialModal");
    if(!bd){
      bd = document.createElement("div");
      bd.id = "hfPerennialModal";
      bd.className = "popup-backdrop";
      bd.innerHTML = `
        <div class="popup">
          <h2 id="hfModalTitle"></h2>
          <div class="popup-subtitle" id="hfModalSub"></div>
          <div id="hfModalBody"></div>
          <button class="popup-close" id="hfModalClose">Close</button>
        </div>
      `;
      document.body.appendChild(bd);
      document.getElementById("hfModalClose").onclick = ()=> bd.style.display="none";
      bd.onclick = e=>{ if(e.target===bd) bd.style.display="none"; };
    }

    document.getElementById("hfModalTitle").textContent = it.common;
    document.getElementById("hfModalSub").textContent = it.sci;
    document.getElementById("hfModalBody").innerHTML = bodyHtml;
    bd.style.display="flex";
  }

  /* =====================================================
     RENDER LIST
     ===================================================== */
  function renderList(){
    const q = (search.value || "").toLowerCase();
    const mode = searchMode();

    const filtered = items.filter(it=>{
      const common = it.common.toLowerCase();
      const sci = it.sci.toLowerCase();

      // search logic
      if(q){
        if(mode==="common" && !common.includes(q)) return false;
        if(mode==="scientific" && !sci.includes(q)) return false;
        if(mode==="both" && !common.includes(q) && !sci.includes(q)) return false;
      }

      // smart filters
      for(const f of activeFilters){
        const def = HF_SMART_FILTERS.find(x=>x.id===f);
        if(def && !def.match.test(it.care)) return false;
      }

      return true;
    });

    count.textContent = `${filtered.length} item${filtered.length===1?"":"s"}`;

    grid.innerHTML = filtered.map(it=>{
      const preview = it.care.length > 90 ? it.care.slice(0,90) + "…" : it.care;
      return `
        <div class="card" data-id="${esc(it.id)}" tabindex="0">
          <div class="card-title">${esc(it.common)}</div>
          <div class="card-sub"><em>${esc(it.sci)}</em></div>
          <div class="card-sub">${esc(preview)}</div>
          <div class="filter-bar" style="margin-top:8px;">
            <span class="filter-chip">Perennial</span>
            <span class="filter-chip">Midwest</span>
          </div>
        </div>
      `;
    }).join("") || `<div class="glass-panel">No matches.</div>`;

    grid.querySelectorAll(".card").forEach(el=>{
      const it = items.find(x=>x.id===el.dataset.id);
      el.onclick = ()=> openPerennialModal(it);
      el.onkeydown = e=>{
        if(e.key==="Enter" || e.key===" "){
          e.preventDefault();
          openPerennialModal(it);
        }
      };
    });
  }

  /* =====================================================
     EVENTS
     ===================================================== */
  search.oninput = renderList;
  document.querySelectorAll('input[name="hfSearchMode"]').forEach(r=>{
    r.onchange = renderList;
  });

  document.querySelectorAll("#hfPerennialFilters .filter-chip").forEach(chip=>{
    chip.onclick = ()=>{
      const id = chip.dataset.filter;
      if(activeFilters.has(id)) activeFilters.delete(id);
      else activeFilters.add(id);
      chip.classList.toggle("active");
      renderList();
    };
  });

  renderList();
}

/* =====================================================
   LOAD PERENNIALS WHEN HF CARE OPENS
   ===================================================== */
document.querySelectorAll("[data-hf-tab]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    if(btn.dataset.hfTab === "care"){
      renderHFPerennials();
    }
  });
});

// Also handle session restore
(function(){
  try{
    if(sessionStorage.getItem("hub_view")==="hf"){
      renderHFPerennials();
    }
  }catch{}
})();
</script>

/* =====================================================
   PEST CSV RENDERER (HF + HPA)
   ===================================================== */
async function renderPestsFromCsv(mountId){
  const mount = document.getElementById(mountId);
  if(!mount) return;

  const rows = await loadCsvSafe("pests.csv");
  if(!rows || rows.length < 2){
    mount.innerHTML = `<div class="glass-panel">No pest data available.</div>`;
    return;
  }

  const header = rows[0].map(h=>h.toLowerCase().trim());
  const idx = n => header.indexOf(n);

  const pests = rows.slice(1).map((r,i)=>({
    id: r[idx("id")] || `pest:${i}`,
    name: r[idx("name")] || "Unnamed Pest",
    signs: r[idx("signs")] || "",
    conditions: r[idx("conditions")] || "",
    treatment: r[idx("treatment")] || "",
    tags: r[idx("tags")] || ""
  }));

  mount.innerHTML = `
    <div class="hf-toolbar">
      <div class="search-wrap">
        <input id="${mountId}-search" type="search" placeholder="Search pests…" />
      </div>
      <div class="hf-count" id="${mountId}-count">${pests.length} pests</div>
    </div>

    <div class="card-grid" id="${mountId}-grid"></div>
  `;

  const grid = document.getElementById(`${mountId}-grid`);
  const search = document.getElementById(`${mountId}-search`);
  const count  = document.getElementById(`${mountId}-count`);

  function render(){
    const q = (search.value || "").toLowerCase();
    const filtered = pests.filter(p=>{
      const hay = `${p.name} ${p.signs} ${p.tags}`.toLowerCase();
      return hay.includes(q);
    });

    count.textContent = `${filtered.length} pest${filtered.length===1?"":"s"}`;

    grid.innerHTML = filtered.map(p=>`
      <div class="card" data-id="${esc(p.id)}" tabindex="0">
        <div class="card-title">${esc(p.name)}</div>
        <div class="card-sub">${esc(p.signs.slice(0,80))}${p.signs.length>80?"…":""}</div>
        <div class="filter-bar" style="margin-top:8px;">
          <span class="filter-chip">Pest</span>
          ${p.tags.split(",").slice(0,2).map(t=>`<span class="filter-chip">${esc(t.trim())}</span>`).join("")}
        </div>
      </div>
    `).join("") || `<div class="glass-panel">No matches.</div>`;

    grid.querySelectorAll(".card").forEach(el=>{
      const pest = pests.find(p=>p.id===el.dataset.id);
      el.onclick = ()=> openPestModal(pest);
      el.onkeydown = e=>{
        if(e.key==="Enter" || e.key===" "){
          e.preventDefault();
          openPestModal(pest);
        }
      };
    });
  }

  search.oninput = render;
  render();
}

/* =====================================================
   LOAD PESTS WHEN TABS OPEN
   ===================================================== */
document.querySelectorAll("[data-hf-care]").forEach(btn=>{
