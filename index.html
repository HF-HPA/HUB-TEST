<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Merchandising Hub</title>

  <!-- Icons -->
  <link rel="icon" href="hf_logo.png" />
  <link rel="apple-touch-icon" href="hf_logo.png" />

  <!-- Leaflet (map used later, safe to load now) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    defer
  ></script>

  <style>
    /* =========================
       DESIGN TOKENS
       ========================= */
    :root{
      --bg:#020617;
      --panel:rgba(15,23,42,.92);
      --glass:rgba(15,23,42,.78);

      --text:#e5e7eb;
      --heading:#f9fafb;
      --muted:#9ca3af;

      --accent:#22d3ee;
      --accent2:#3b82f6;

      --good:#22c55e;
      --warn:#facc15;
      --bad:#ef4444;

      --radius:18px;
      --radiusXL:26px;
      --pill:999px;
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ height:100%; }

    body{
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background:
        linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.85)),
        url("philo.jpg") center/cover fixed;
      color:var(--text);
    }

    .hidden{ display:none !important; }

    /* =========================
       APP SHELL
       ========================= */
    .app-shell{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }

    .app-inner{
      width:100%;
      max-width:1200px;
      background:var(--panel);
      border-radius:var(--radiusXL);
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    /* =========================
       SPLASH (FIXED)
       ========================= */
    .splash{
      min-height:80vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
    }

    .splash-logo-wrap{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    /* ✅ PERFECT CIRCULAR GLOW */
    .splash-glow{
      position:absolute;
      width:200px;
      height:200px;
      border-radius:50%;
      background: radial-gradient(
        circle,
        rgba(34,211,238,.55) 0%,
        rgba(34,211,238,.35) 35%,
        rgba(34,211,238,.15) 55%,
        rgba(34,211,238,0) 70%
      );
      filter: blur(14px);
      animation: glowPulse 2.6s ease-in-out infinite;
      z-index:1;
    }

    @keyframes glowPulse{
      0%{ transform:scale(.85); opacity:.55; }
      50%{ transform:scale(1.05); opacity:.9; }
      100%{ transform:scale(.85); opacity:.55; }
    }

    .splash-logo{
      width:160px;
      height:160px;
      border-radius:30px;
      object-fit:cover;
      position:relative;
      z-index:2;
      box-shadow:
        0 18px 50px rgba(0,0,0,.85),
        0 0 24px rgba(34,211,238,.25);
    }

    .splash-hint{
      font-size:.8rem;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:var(--muted);
    }

    /* =========================
       MAP CONTAINER (used later)
       ========================= */
    #storeMap{
      width:100%;
      height:60vh;
      min-height:500px;
      border-radius:var(--radius);
    }
  </style>
</head>
<body>

<main class="app-shell">
  <div class="app-inner">

    <!-- ================= SPLASH ================= -->
    <section id="view-splash" class="splash">
      <div class="splash-logo-wrap"
           id="splashEnter"
           role="button"
           aria-label="Enter login">

        <div class="splash-glow"></div>
        hf_logo.png

      </div>

      <div class="splash-hint">Tap to continue</div>
    </section>

    <!-- ================= LOGIN ================= -->
    <section id="view-login" class="hidden">
      <div style="max-width:360px;margin:auto;background:rgba(15,23,42,.78);padding:18px;border-radius:18px;">

        hf_logo.png

        <h2 style="margin-top:10px;">Sign In</h2>
        <p style="color:var(--muted);font-size:.85rem;">Internal Tool</p>

        <div style="margin-top:12px;">
          <label style="font-size:.8rem;color:var(--muted);">Username</label>
          <input
            id="loginUser"
            type="text"
            autocomplete="username"
            style="width:100%;padding:10px;border-radius:12px;margin-top:4px;"
          />
        </div>

        <div style="margin-top:10px;">
          <label style="font-size:.8rem;color:var(--muted);">Password</label>
          <input
            id="loginPass"
            type="password"
            autocomplete="current-password"
            style="width:100%;padding:10px;border-radius:12px;margin-top:4px;"
          />
        </div>

        <button
          id="loginBtn"
          style="width:100%;margin-top:14px;padding:10px;border-radius:999px;font-weight:900;
                 background:linear-gradient(135deg,var(--accent),var(--accent2));
                 color:#020617;border:none;cursor:pointer;"
        >
          Login
        </button>

        <div
          id="loginError"
          style="margin-top:8px;color:#ef4444;font-size:.85rem;"
        ></div>

      </div>
    </section>

    <!-- ================= TOP BAR ================= -->
    <header id="topbar" class="hidden"
      style="display:flex;justify-content:space-between;align-items:center;
             background:rgba(15,23,42,.78);padding:10px;border-radius:18px;">

      <strong>Merchandising Hub</strong>

      <nav style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="nav-link active" data-view="map">Map</button>
        <button class="nav-link" data-view="hf">HF</button>
        <button class="nav-link" data-view="hpa">HPA</button>
        <button class="nav-link" data-view="admin">Admin</button>
        <button class="nav-link" data-view="training">Training</button>
        <button id="logoutBtn">Logout</button>
      </nav>
    </header>

    <!-- ================= MAP ================= -->
    <section id="view-map" class="hidden">
      <div style="margin-bottom:8px;">
        <strong>Store Map</strong>
      </div>

      <div class="map-layout">
        <div id="storeMap"></div>

        <aside class="store-panel">
          <div>
            <div class="sp-title" id="spTitle">Select a store</div>
            <div class="sp-sub" id="spSub">Click a pin on the map</div>
          </div>

          <div class="kv">
            <span>Watered</span>
            <span id="spWatered">—</span>
          </div>

          <div class="kv">
            <span>Negatives</span>
            <span id="spNegatives">—</span>
          </div>

          <div class="kv">
            <span>Issues</span>
            <span id="spIssues">—</span>
          </div>

          <!-- checklist injected later -->

          <button id="btnAddIssue" disabled>Add Issue</button>
        </aside>
      </div>
    </section>

    <!-- ================= HF ================= -->
    <section id="view-hf" class="hidden">
      <div>
        <h3>HF</h3>
        <div id="hf-guidelines"></div>
      </div>
    </section>

    <!-- ================= HPA ================= -->
    <section id="view-hpa" class="hidden">
      <div>
        <h3>HPA</h3>
        <div id="hpa-guidelines"></div>
      </div>
    </section>

    <!-- ================= ADMIN ================= -->
    <section id="view-admin" class="hidden">
      <div>
        <h3>Admin</h3>
        <p style="color:var(--muted);font-size:.85rem;">
          Admin tools will appear here.
        </p>
      </div>
    </section>

    <!-- ================= TRAINING ================= -->
    <section id="view-training" class="hidden">
      <div>
        <h3>Training</h3>
        <p style="color:var(--muted);font-size:.85rem;">
          Training modules will appear here.
        </p>
      </div>
    </section>

  </div>
</main>
<script>
/* ======================================================
   SEGMENT 3 — SPLASH → LOGIN, LOGIN, ROUTING
   ====================================================== */

/* ------------------ App State ------------------ */
const App = {
  user: null,
  view: "splash"
};

const VIEWS = ["splash","login","map","hf","hpa","admin","training"];

/* ------------------ Helpers ------------------ */
const $ = (id) => document.getElementById(id);

function show(view){
  VIEWS.forEach(v=>{
    const el = $("view-" + v);
    if(el) el.classList.toggle("hidden", v !== view);
  });
  App.view = view;
}

function setActiveNav(view){
  document.querySelectorAll(".nav-link").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.view === view);
  });
}

/* ------------------ CSV Parser (REAL, SAFE) ------------------ */
function parseCSV(text){
  const rows = [];
  let row = [], val = "", inQuotes = false;

  for(let i=0;i<text.length;i++){
    const c = text[i];
    const n = text[i+1];

    if(c === '"' && inQuotes && n === '"'){
      val += '"'; i++;
    } else if(c === '"'){
      inQuotes = !inQuotes;
    } else if(c === "," && !inQuotes){
      row.push(val); val="";
    } else if((c === "\n" || c === "\r") && !inQuotes){
      if(val || row.length){
        row.push(val);
        rows.push(row);
        row=[]; val="";
      }
    } else {
      val += c;
    }
  }
  if(val || row.length){
    row.push(val);
    rows.push(row);
  }
  return rows;
}

/* ======================================================
   SPLASH → LOGIN (FIXED CLICK TARGET)
   ====================================================== */
const splashEnter = $("splashEnter");

if(splashEnter){
  splashEnter.addEventListener("click", (e)=>{
    e.preventDefault();
    show("login");
  });

  splashEnter.style.cursor = "pointer";
}

/* ======================================================
   LOGIN
   ====================================================== */
async function loadUsers(){
  try{
    const txt = await fetch("users.csv", { cache:"no-store" }).then(r=>r.text());
    const rows = parseCSV(txt);
    const header = rows[0].map(h=>String(h).toLowerCase());

    const uIdx = header.indexOf("username");
    const pIdx = header.indexOf("password");

    return rows.slice(1)
      .map(r=>({
        username: (r[uIdx]||"").trim().toLowerCase(),
        password: (r[pIdx]||"").trim()
      }))
      .filter(u=>u.username && u.password);
  }catch{
    /* ✅ Safe fallback so login ALWAYS works */
    return [{ username:"demo", password:"demo" }];
  }
}

async function doLogin(){
  const user = $("loginUser").value.trim().toLowerCase();
  const pass = $("loginPass").value.trim();
  const err = $("loginError");
  err.textContent = "";

  if(!user || !pass){
    err.textContent = "Enter username and password.";
    return;
  }

  const users = await loadUsers();
  const match = users.find(u => u.username === user && u.password === pass);

  if(!match){
    err.textContent = "Invalid credentials.";
    return;
  }

  App.user = { username:user };
  sessionStorage.setItem("hub_user", JSON.stringify(App.user));

  $("topbar").classList.remove("hidden");
  setActiveNav("map");
  show("map");
}

$("loginBtn").addEventListener("click", doLogin);
$("loginPass").addEventListener("keydown", e=>{
  if(e.key === "Enter") doLogin();
});

/* ======================================================
   LOGOUT
   ====================================================== */
$("logoutBtn").addEventListener("click", ()=>{
  App.user = null;
  sessionStorage.removeItem("hub_user");
  $("topbar").classList.add("hidden");
  show("splash");
});

/* ======================================================
   NAVIGATION
   ====================================================== */
document.querySelectorAll(".nav-link").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const view = btn.dataset.view;
    setActiveNav(view);
    show(view);
  });
});

/* ======================================================
   SESSION RESTORE
   ====================================================== */
(function restoreSession(){
  try{
    const raw = sessionStorage.getItem("hub_user");
    if(raw){
      App.user = JSON.parse(raw);
      $("topbar").classList.remove("hidden");
      setActiveNav("map");
      show("map");
      return;
    }
  }catch{}

  show("splash");
})();
</script>
<script>
/* ======================================================
   SEGMENT 4 — Leaflet Map + stores.csv + Pins (Stable)
   Depends on SEGMENT 3:
   - parseCSV()
   - show(view)
   - App (session state)
   ====================================================== */

(function injectMapStyles(){
  if (document.getElementById("mapStyles")) return;
  const st = document.createElement("style");
  st.id = "mapStyles";
  st.textContent = `
    .map-layout{
      display:grid;
      grid-template-columns: 1fr 360px;
      gap:12px;
      margin-top:10px;
    }
    @media (max-width: 900px){
      .map-layout{ grid-template-columns: 1fr; }
    }

    /* Store picker block */
    .picker{
      background: rgba(15,23,42,.78);
      border-radius: 18px;
      padding: 12px;
      border: 1px solid rgba(148,163,184,.22);
      margin-bottom: 10px;
    }
    .picker-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .picker-row input, .picker-row select{
      flex:1;
      min-width: 220px;
      padding:10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.22);
      background: rgba(2,6,23,.85);
      color: var(--text);
    }
    .picker-row button{
      padding:10px 14px;
      border-radius:999px;
      border:none;
      font-weight:900;
      cursor:pointer;
      background: linear-gradient(135deg,var(--accent),var(--accent2));
      color:#020617;
    }

    /* Marker */
    .pin{
      width:18px;height:18px;border-radius:999px;
      border:2px solid rgba(255,255,255,.85);
      box-shadow:0 6px 18px rgba(0,0,0,.7);
      background: var(--bad);
    }
  `;
  document.head.appendChild(st);
})();

/* -------- MapModule (single owner, no overrides) -------- */
const MapModule = (() => {
  let map = null;
  let markers = new Map();
  let stores = [];
  let inited = false;

  function waitForLeaflet(){
    return new Promise(resolve => {
      const tick = () => {
        if (window.L && typeof window.L.map === "function") resolve();
        else setTimeout(tick, 50);
      };
      tick();
    });
  }

  function isMapViewVisible(){
    const v = document.getElementById("view-map");
    return v && !v.classList.contains("hidden");
  }

  function ensurePicker(){
    const mapView = document.getElementById("view-map");
    if(!mapView) return;
    if(document.getElementById("storePicker")) return;

    const picker = document.createElement("div");
    picker.id = "storePicker";
    picker.className = "picker";
    picker.innerHTML = `
      <div style="font-weight:900;letter-spacing:.10em;text-transform:uppercase;color:var(--heading);font-size:.85rem;">
        Store Picker
      </div>
      <div class="picker-row" style="margin-top:10px;">
        <input id="storeSearch" placeholder="Search store # or name…" />
        <select id="storeSelect"></select>
        <button id="storeGoBtn" type="button">Go</button>
      </div>
      <div style="margin-top:8px;color:var(--muted);font-size:.82rem;">
        Tip: click any pin to open that store panel.
      </div>
    `;
    mapView.insertBefore(picker, mapView.firstChild);
  }

  async function loadStores(){
    try{
      const txt = await fetch("stores.csv", { cache:"no-store" }).then(r=>{
        if(!r.ok) throw new Error("stores.csv missing");
        return r.text();
      });

      const rows = parseCSV(txt);
      const header = rows[0].map(h => String(h).toLowerCase().trim());

      const idIdx = header.indexOf("store_id");
      const nameIdx = header.indexOf("store_name");
      const latIdx = header.indexOf("lat");
      const lonIdx = header.indexOf("lon");
      const cityIdx = header.indexOf("city");
      const stateIdx = header.indexOf("state");

      stores = rows.slice(1).map(r=>({
        id: (r[idIdx]||"").trim(),
        name: (r[nameIdx]||"").trim(),
        lat: parseFloat((r[latIdx]||"").trim()),
        lon: parseFloat((r[lonIdx]||"").trim()),
        city: (r[cityIdx]||"").trim(),
        state: (r[stateIdx]||"").trim()
      })).filter(s => s.id && s.name && !Number.isNaN(s.lat) && !Number.isNaN(s.lon));

      if(!stores.length) throw new Error("no valid rows");
    }catch(e){
      console.warn("[map] using demo stores:", e);
      stores = [
        { id:"1950", name:"South Loop", lat:41.856, lon:-87.624, city:"Chicago", state:"IL" },
        { id:"1987", name:"Glenview",  lat:42.079, lon:-87.822, city:"Glenview", state:"IL" }
      ];
    }

    window.AppStores = stores;
  }

  function initLeaflet(){
    if(map) return;
    const mapEl = document.getElementById("storeMap");
    if(!mapEl) return;

    map = L.map(mapEl, { zoomControl:true, preferCanvas:true });
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(map);
  }

  function markerIconHTML(){
    return `<div class="pin"></div>`;
  }

  function clearMarkers(){
    markers.forEach(m => map.removeLayer(m));
    markers.clear();
  }

  function renderMarkers(){
    clearMarkers();
    const bounds = [];

    stores.forEach(s=>{
      const icon = L.divIcon({
        className:"",
        html: markerIconHTML(),
        iconSize:[18,18],
        iconAnchor:[9,9]
      });

      const m = L.marker([s.lat, s.lon], { icon }).addTo(map);
      m.on("click", ()=> selectStore(s));
      markers.set(s.id, m);
      bounds.push([s.lat, s.lon]);
    });

    if(bounds.length) map.fitBounds(bounds, { padding:[24,24] });
  }

  function buildPicker(){
    const select = document.getElementById("storeSelect");
    const search = document.getElementById("storeSearch");
    const go = document.getElementById("storeGoBtn");
    if(!select || !search || !go) return;

    const sorted = [...stores].sort((a,b)=>(Number(a.id)||0)-(Number(b.id)||0));
    select.innerHTML = sorted.map(s=>`<option value="${s.id}">${s.id} — ${s.name}</option>`).join("");

    search.oninput = ()=>{
      const q = search.value.toLowerCase().trim();
      if(!q) return;
      const match = sorted.find(s => (`${s.id} ${s.name}`).toLowerCase().includes(q));
      if(match) select.value = match.id;
    };

    go.onclick = ()=>{
      const id = select.value;
      const s = stores.find(x=>x.id===id);
      if(!s) return;
      focusStore(s);
    };
  }

  function focusStore(store){
    const marker = markers.get(store.id);
    if(marker) map.setView(marker.getLatLng(), 12, { animate:true });
    selectStore(store);
  }

  function selectStore(store){
    document.getElementById("spTitle").textContent = `${store.name} (${store.id})`;
    document.getElementById("spSub").textContent = [store.city, store.state].filter(Boolean).join(", ") || "—";

    // placeholder values until Segment 5
    document.getElementById("spWatered").textContent = "—";
    document.getElementById("spNegatives").textContent = "—";
    document.getElementById("spIssues").textContent = "—";

    // enable issue button now; Segment 5 will wire logic
    const addIssue = document.getElementById("btnAddIssue");
    if(addIssue) addIssue.disabled = false;

    window.SelectedStore = store;
  }

  function invalidate(){
    if(!map) return;
    setTimeout(()=> map.invalidateSize(), 80);
  }

  async function ensureInit(){
    if(inited) {
      if(isMapViewVisible()) invalidate();
      return;
    }
    inited = true;

    ensurePicker();
    await waitForLeaflet();
    await loadStores();

    // only init when map view is visible
    if(isMapViewVisible()){
      initLeaflet();
      renderMarkers();
      buildPicker();
      invalidate();
    }
  }

  // watch view-map visibility changes to init map only when shown
  function watchVisibility(){
    const mapView = document.getElementById("view-map");
    if(!mapView) return;

    const obs = new MutationObserver(()=>{
      if(isMapViewVisible()){
        ensureInit();
        if(map) invalidate();
      }
    });

    obs.observe(mapView, { attributes:true, attributeFilter:["class"] });
  }

  return { ensureInit, watchVisibility, invalidate };
})();

/* Start watching map view right away */
MapModule.watchVisibility();

/* If session restore already put us on map, init now */
if(!document.getElementById("view-map").classList.contains("hidden")){
  MapModule.ensureInit();
}

/* Also hook navigation so selecting "map" always triggers invalidate */
document.querySelectorAll(".nav-link").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    if(btn.dataset.view === "map"){
      MapModule.ensureInit();
      MapModule.invalidate();
    }
  });
});
</script>
  <script>
/* ======================================================
   SEGMENT 5 — Checklist + Issues + Status Markers
   Works with Segment 4 MapModule by capturing L.map()
   Depends on Segment 3 parseCSV()
   ====================================================== */

/* ---------- Style injection (pins + flag + checklist + modal) ---------- */
(function injectChecklistAndPinStyles(){
  if (document.getElementById("seg5Styles")) return;
  const st = document.createElement("style");
  st.id = "seg5Styles";
  st.textContent = `
    /* Pin colors */
    .pin-ok{ background: var(--good) !important; }
    .pin-warn{ background: var(--warn) !important; }
    .pin-bad{ background: var(--bad) !important; }

    /* Flag above pin for issues */
    .pin .flagpole{
      position:absolute; left:8px; top:-14px;
      width:2px; height:14px;
      background: rgba(255,255,255,.85);
      border-radius:2px;
      box-shadow:0 6px 14px rgba(0,0,0,.5);
    }
    .pin .flagpole::after{
      content:"";
      position:absolute; top:2px; left:2px;
      width:12px; height:8px;
      background: var(--bad);
      clip-path: polygon(0 0, 100% 18%, 0 50%, 100% 82%, 0 100%);
      border-radius:2px;
      box-shadow:0 6px 14px rgba(0,0,0,.55);
    }

    /* Checklist box */
    .checklist-box{
      margin-top:10px;
      background: rgba(15,23,42,.78);
      border: 1px solid rgba(148,163,184,.22);
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 14px 40px rgba(0,0,0,.55);
    }
    .checklist-title{
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-size: .82rem;
      color: var(--heading);
      margin-bottom: 8px;
    }
    .checklist-row{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding: 6px 0;
      border-bottom: 1px solid rgba(148,163,184,.10);
      font-size: .9rem;
      cursor:pointer;
    }
    .checklist-row:last-child{ border-bottom:none; }
    .checklist-row input{
      margin-top: 2px;
      accent-color: var(--accent);
    }
    .checklist-meta{
      margin-top:10px;
      color: var(--muted);
      font-size:.82rem;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    /* Issues modal */
    .modal-backdrop{
      position:fixed; inset:0;

/* ---------- Persistent state ---------- */
const STORE_STATE_KEY = "hub_store_state_v10";
const todayKey = () => new Date().toISOString().slice(0,10);
const uuid = () => (crypto?.randomUUID?.()) || (String(Date.now()) + Math.random().toString(16).slice(2));

function loadState(){
  try { return JSON.parse(localStorage.getItem(STORE_STATE_KEY) || "{}"); }
  catch { return {}; }
}
function saveState(){
  try { localStorage.setItem(STORE_STATE_KEY, JSON.stringify(StoreState)); } catch {}
}

const StoreState = loadState();

function defaultStoreState(){
  return {
    watered:false,
    wateredOn:null,       // YYYY-MM-DD
    negatives:false,
    pictures:false,
    checklist:{},         // dynamic items
    issues:[],            // {id,text,createdAt,createdBy,resolved}
    updatedAt:null
  };
}

function ensureStore(id){
  if(!StoreState[id]) StoreState[id] = defaultStoreState();
  const st = StoreState[id];
  if(!st.checklist || typeof st.checklist !== "object") st.checklist = {};
  if(!Array.isArray(st.issues)) st.issues = [];

  // daily reset for watered
  if(st.wateredOn !== todayKey()){
    st.watered = false;
  }
  return st;
}

/* ---------- Dynamic checklist items from CSV ---------- */
const ChecklistSchema = {
  loaded:false,
  items:[],
  async load(){
    if(this.loaded) return this.items;
    try{
      const txt = await fetch("checklist_items.csv",{cache:"no-store"}).then(r=>{
        if(!r.ok) throw new Error("missing");
        return r.text();
      });
      const rows = parseCSV(txt); // from Segment 3
      const header = rows[0].map(h=>String(h).toLowerCase().trim());
      const idIdx = header.indexOf("item_id");
      const labelIdx = header.indexOf("label");
      const activeIdx = header.indexOf("active");

      this.items = rows.slice(1).map(r=>({
        id: String(r[idIdx]||"").trim(),
        label: String(r[labelIdx]||"").trim(),
        active: String(r[activeIdx]||"true").trim().toLowerCase() !== "false"
      })).filter(x=>x.id && x.label && x.active);
    }catch(e){
      console.warn("[checklist] checklist_items.csv missing; using none", e);
      this.items = [];
    }
    this.loaded = true;
    return this.items;
  }
};

/* ---------- Completion + status rules ---------- */
function openIssueCount(storeId){
  return ensureStore(storeId).issues.filter(i=>!i.resolved).length;
}
function hasOpenIssues(storeId){
  return openIssueCount(storeId) > 0;
}

function completion(storeId){
  const st = ensureStore(storeId);
  const dyn = ChecklistSchema.items;
  const total = 3 + dyn.length; // Watered/Negatives/Pictures + CSV
  let done = 0;

  if(st.watered && st.wateredOn === todayKey()) done++;
  if(st.negatives) done++;
  if(st.pictures) done++;

  dyn.forEach(it=>{
    if(st.checklist[it.id] === true) done++;
  });

  return { done, total, pct: total ? done/total : 0 };
}

/* Your rules:
   - any open issue => yellow + red flag
   - else <50 red, >=50 yellow, 100 green
*/
function storeStatus(storeId){
  if(hasOpenIssues(storeId)) return "warn";
  const { pct } = completion(storeId);
  if(pct >= 1) return "ok";
  if(pct >= 0.5) return "warn";
  return "bad";
}

/* ---------- Capture Leaflet map instance by wrapping L.map() ---------- */
let HUB_MAP = null;

function hookLeafletMapCapture(){
  if(!window.L || window.L.__hubWrapped) return;

  const orig = window.L.map;
  window.L.map = function(...args){
    const m = orig.apply(this, args);
    HUB_MAP = m;
    window.L.__hubWrapped = true;
    // build marker index after map is ready
    setTimeout(buildMarkerIndex, 150);
    return m;
  };
}

/* Poll until Leaflet loads, then wrap */
(function waitForLeaflet(){
  const tick = ()=>{
    if(window.L){
      hookLeafletMapCapture();
    } else {
      setTimeout(tick, 50);
    }
  };
  tick();
})();

/* ---------- Marker index: storeId -> marker layer ---------- */
const MarkerIndex = {
  built:false,
  byId:new Map()
};

function buildMarkerIndex(){
  if(!HUB_MAP || !window.AppStores?.length) return;

  MarkerIndex.byId.clear();
  const layers = [];
  HUB_MAP.eachLayer(layer=>{
    if(layer && typeof layer.getLatLng === "function" && typeof layer.setIcon === "function"){
      layers.push(layer);
    }
  });

  for(const s of window.AppStores){
    const match = layers.find(m=>{
      const ll = m.getLatLng();
      return Math.abs(ll.lat - s.lat) < 1e-7 && Math.abs(ll.lng - s.lon) < 1e-7;
    });
    if(match) MarkerIndex.byId.set(s.id, match);
  }

  MarkerIndex.built = true;
  updateAllMarkers();
}

function markerHtml(storeId){
  const status = storeStatus(storeId);
  const flag = hasOpenIssues(storeId);
  const cls = status === "ok" ? "pin-ok" : status === "warn" ? "pin-warn" : "pin-bad";
  return `
    <div class="pin ${cls}">
      ${flag ? `<span class="flagpole"></span>` : ``}
    </div>
  `;
}

function updateMarker(storeId){
  if(!MarkerIndex.built) buildMarkerIndex();
  const marker = MarkerIndex.byId.get(storeId);
  if(!marker || !window.L) return;

  const icon = L.divIcon({
    className:"",
    html: markerHtml(storeId),
    iconSize:[18,18],
    iconAnchor:[9,9]
  });
  marker.setIcon(icon);
}

function updateAllMarkers(){
  if(!ChecklistSchema.loaded) return;
  for(const s of (window.AppStores||[])){
    ensureStore(s.id);
    updateMarker(s.id);
  }
}

/* ---------- Checklist UI injection ---------- */
function ensureChecklistUI(){
  if(document.getElementById("checklistBox")) return;

  const panel = document.querySelector(".store-panel");
  if(!panel) return;

  const box = document.createElement("div");
  box.id = "checklistBox";
  box.className = "checklist-box";
  box.innerHTML = `
    <div class="checklist-title">Checklist</div>
    <div id="checklistRows"></div>
    <div class="checklist-meta">
      <div>Completion: <strong id="checkPct">0%</strong></div>
      <div id="checkCount">0/0</div>
    </div>
  `;

  const addIssueBtn = document.getElementById("btnAddIssue");
  panel.insertBefore(box, addIssueBtn);

  // Add View Issues button
  const viewBtn = document.createElement("button");
  viewBtn.id = "btnViewIssues";
  viewBtn.className = "pill-btn";
  viewBtn.style.display = "none";
  viewBtn.textContent = "🚩 View Issues";
  panel.insertBefore(viewBtn, addIssueBtn.nextSibling);
}

function renderChecklist(storeId){
  ensureChecklistUI();
  const st = ensureStore(storeId);

  const rowsEl = document.getElementById("checklistRows");
  const pctEl = document.getElementById("checkPct");
  const countEl = document.getElementById("checkCount");
  if(!rowsEl || !pctEl || !countEl) return;

  const dyn = ChecklistSchema.items;
  const { done, total, pct } = completion(storeId);
  pctEl.textContent = `${Math.round(pct*100)}%`;
  countEl.textContent = `${done}/${total}`;

  const row = (key, label, checked) => `
    <label class="checklist-row">
      <input type="checkbox" data-ck="${key}" ${checked ? "checked" : ""} />
      <span>${label}</span>
    </label>
  `;

  rowsEl.innerHTML = [
    row("watered", "Watered (resets daily)", st.watered && st.wateredOn === todayKey()),
    row("negatives", "Negatives", !!st.negatives),
    row("pictures", "Pictures", !!st.pictures),
    ...dyn.map(it => row("dyn:"+it.id, it.label, st.checklist[it.id] === true))
  ].join("");

  rowsEl.onchange = (e)=>{
    const cb = e.target.closest("input[data-ck]");
    if(!cb) return;
    const key = cb.getAttribute("data-ck");

    if(key === "watered"){
      st.watered = cb.checked;
      st.wateredOn = cb.checked ? todayKey() : null;
    } else if(key === "negatives"){
      st.negatives = cb.checked;
    } else if(key === "pictures"){
      st.pictures = cb.checked;
    } else if(key.startsWith("dyn:")){
      const id = key.slice(4);
      st.checklist[id] = cb.checked;
    }

    st.updatedAt = Date.now();
    StoreState[storeId] = st;
    saveState();

    // Update side panel indicators
    document.getElementById("spWatered").textContent = (st.watered && st.wateredOn===todayKey()) ? "✅" : "❌";
    document.getElementById("spNegatives").textContent = st.negatives ? "⚠️" : "✅";
    document.getElementById("spIssues").textContent = openIssueCount(storeId) ? `🚩 ${openIssueCount(storeId)}` : "✅ None";

    // Update visuals
    renderChecklist(storeId);
    updateMarker(storeId);
    renderViewIssuesButton(storeId);
  };
}

/* ---------- Issues Modal ---------- */
function ensureIssuesModal(){
  if(document.getElementById("issuesBackdrop")) return;

  const bd = document.createElement("div");
  bd.id = "issuesBackdrop";
  bd.className = "modal-backdrop";
  bd.innerHTML = `
    <div class="modal">
      <h2>Store Issues</h2>
      <div class="sub" id="issuesLabel"></div>
      <div id="issuesList"></div>
      <div class="modal-actions">
        <button class="pill-btn" id="issuesClose">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(bd);

  const close = ()=> bd.style.display="none";
  document.getElementById("issuesClose").onclick = close;
  bd.onclick = (e)=>{ if(e.target === bd) close(); };
}

function renderViewIssuesButton(storeId){
  const btn = document.getElementById("btnViewIssues");
  if(!btn) return;
  const st = ensureStore(storeId);

  btn.style.display = st.issues.length ? "inline-flex" : "none";
  btn.onclick = ()=> openIssuesModal(storeId);
}

function openIssuesModal(storeId){
  ensureIssuesModal();

  const store = (window.AppStores||[]).find(s=>s.id===storeId);
  document.getElementById("issuesLabel").textContent =
    store ? `${store.name} (${store.id})` : `Store ${storeId}`;

  const st = ensureStore(storeId);
  const list = document.getElementById("issuesList");

  if(!st.issues.length){
    list.innerHTML = `<div class="issue-card">No issues reported.</div>`;
  } else {
    list.innerHTML = st.issues.map(i=>`
      <div class="issue-card">
        <div class="issue-top">
          <div>${i.text.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>
          <div class="${i.resolved ? "issue-done" : "issue-open"}">${i.resolved ? "Resolved" : "Open"}</div>
        </div>
        <div class="issue-meta">
          Reported by ${i.createdBy.replace(/</g,"&lt;").replace(/>/g,"&gt;")} • ${new Date(i.createdAt).toLocaleString()}
        </div>
        ${!i.resolved ? `<button class="pill-btn" data-resolve="${i.id}" style="margin-top:8px;">✅ Mark Resolved</button>` : ``}
      </div>
    `).join("");
  }

  list.onclick = (e)=>{
    const b = e.target.closest("[data-resolve]");
    if(!b) return;
    const id = b.getAttribute("data-resolve");
    const issue = st.issues.find(x=>x.id===id);
    if(!issue) return;

    issue.resolved = true;
    st.updatedAt = Date.now();
    StoreState[storeId] = st;
    saveState();

    updateMarker(storeId);
    renderChecklist(storeId);
    renderViewIssuesButton(storeId);

    document.getElementById("spIssues").textContent = openIssueCount(storeId) ? `🚩 ${openIssueCount(storeId)}` : "✅ None";

    openIssuesModal(storeId); // refresh modal
  };

  document.getElementById("issuesBackdrop").style.display = "flex";
}

/* ---------- Add Issue button wiring ---------- */
function wireAddIssue(storeId){
  const btn = document.getElementById("btnAddIssue");
  if(!btn) return;
  btn.disabled = false;

  btn.onclick = ()=>{
    const st = ensureStore(storeId);
    const msg = prompt("Enter issue details:");
    if(!msg) return;

    st.issues.push({
      id: uuid(),
      text: msg.trim(),
      createdAt: Date.now(),
      createdBy: (App?.user?.username || "User"),
      resolved: false
    });

    st.updatedAt = Date.now();
    StoreState[storeId] = st;
    saveState();

    // Issue override => Yellow + Red flag
    updateMarker(storeId);
    renderChecklist(storeId);
    renderViewIssuesButton(storeId);

    document.getElementById("spIssues").textContent = `🚩 ${openIssueCount(storeId)}`;
  };
}

/* ---------- Hook into store selection from Segment 4 (window.SelectedStore) ---------- */
let lastStore = null;
setInterval(()=>{
  const s = window.SelectedStore;
  if(!s || !s.id) return;
  if(lastStore === s.id) return;
  lastStore = s.id;

  ChecklistSchema.load().then(()=>{
    // ensure state + render panel values
    const st = ensureStore(s.id);

    document.getElementById("spWatered").textContent = (st.watered && st.wateredOn===todayKey()) ? "✅" : "❌";
    document.getElementById("spNegatives").textContent = st.negatives ? "⚠️" : "✅";
    document.getElementById("spIssues").textContent = openIssueCount(s.id) ? `🚩 ${openIssueCount(s.id)}` : "✅ None";

    renderChecklist(s.id);
    wireAddIssue(s.id);
    renderViewIssuesButton(s.id);

    // ensure marker index exists & paint this marker correctly
    buildMarkerIndex();
    updateMarker(s.id);
  });
}, 200);

/* ---------- Initial load: schema + paint markers once stores & map exist ---------- */
ChecklistSchema.load().then(()=>{
  // try to build marker index a few times until map is created
  let tries = 0;
  const tick = ()=>{
    tries++;
    buildMarkerIndex();
    updateAllMarkers();
    if((MarkerIndex.built && HUB_MAP) || tries > 30) return;
    setTimeout(tick, 200);
  };
  tick();
});
</script>
<script>
/* ======================================================
   SEGMENT 6 — HF / HPA CONTENT + TRAINING + FINAL BOOT
   ====================================================== */

/* ------------------ Helpers ------------------ */
function esc(s){
  return String(s ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

/* ------------------ Simple CSV loader ------------------ */
async function loadCsvSafe(url){
  try{
    const r = await fetch(url, { cache:"no-store" });
    if(!r.ok) throw new Error("missing");
    return parseCSV(await r.text());
  }catch{
    return null;
  }
}

/* ------------------ Render Guidelines ------------------ */
/* Expected CSV headers (flexible):
   category | section
   text | guideline | item
*/
async function renderGuidelines(csvUrl, mountId){
  const mount = document.getElementById(mountId);
  if(!mount) return;

  const rows = await loadCsvSafe(csvUrl);
  if(!rows || rows.length < 2){
    mount.innerHTML = `<div style="color:var(--muted);">No guidelines available.</div>`;
    return;
  }

  const header = rows[0].map(h=>String(h).toLowerCase().trim());
  const catIdx =
    header.indexOf("category") >= 0 ? header.indexOf("category") :
    header.indexOf("section") >= 0 ? header.indexOf("section") : 0;

  const txtIdx =
    header.indexOf("text") >= 0 ? header.indexOf("text") :
    header.indexOf("guideline") >= 0 ? header.indexOf("guideline") :
    header.indexOf("item") >= 0 ? header.indexOf("item") : 1;

  const grouped = {};
  rows.slice(1).forEach(r=>{
    const cat = r[catIdx] || "General";
    const txt = r[txtIdx];
    if(!txt) return;
    if(!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(txt);
  });

  mount.innerHTML = Object.entries(grouped).map(([cat,items])=>`
    <div style="margin-bottom:12px;padding:12px;border-radius:14px;
                background:rgba(15,23,42,.78);
                border:1px solid rgba(148,163,184,.22);">
      <div style="font-weight:900;letter-spacing:.1em;text-transform:uppercase;
                  font-size:.82rem;margin-bottom:6px;">
        ${esc(cat)}
      </div>
      <ul style="margin-left:16px;font-size:.9rem;">
        ${items.map(i=>`<li>${esc(i)}</li>`).join("")}
      </ul>
    </div>
  `).join("");
}

/* ------------------ HF Loader ------------------ */
async function loadHF(){
  await renderGuidelines("hf_guidelines.csv", "hf-guidelines");
}

/* ------------------ HPA Loader ------------------ */
async function loadHPA(){
  await renderGuidelines("hpa_guidelines.csv", "hpa-guidelines");
}

/* ------------------ Training Tabs ------------------ */
(function initTraining(){
  const btns = document.querySelectorAll("[data-train]");
  if(!btns.length) return;

  btns.forEach(btn=>{
    btn.addEventListener("click", ()=>{
      btns.forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");

      const key = btn.dataset.train;
      ["basics","merch","supervisor"].forEach(k=>{
        const el = document.getElementById("train-"+k);
        if(el) el.classList.toggle("hidden", k !== key);
      });
    });
  });
})();

/* ------------------ Navigation Hooks ------------------ */
document.querySelectorAll(".nav-link").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const view = btn.dataset.view;
    if(view === "hf") loadHF();
    if(view === "hpa") loadHPA();
  });
});

/* ------------------ Final Boot Sanity ------------------ */
console.log("✅ SEGMENT 6 loaded — HF, HPA, Training ready");
</script>
</body>
