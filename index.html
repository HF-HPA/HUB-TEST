<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Merchandising Hub</title>

  <!-- Icons -->
  <link rel="icon" type="image/png" href="hf_logo.png" />
  <link rel="apple-touch-icon" href="hf_logo.png" />

  <!-- Leaflet (base include; Segment 4 also has safe loader) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* =========================================================
       THEME (original + add-ons)
       ========================================================= */
    :root{
      --bg: #020617;
      --bg-alt: #030a1a;
      --card-bg: rgba(15, 23, 42, 0.85);
      --card-glass: rgba(15, 23, 42, 0.75);
      --text: #e5e7eb;
      --heading: #f9fafb;
      --muted: #9ca3af;

      --border-subtle: rgba(148, 163, 184, 0.45);
      --border-soft: rgba(148, 163, 184, 0.25);

      --radius-lg: 14px;
      --radius-md: 10px;
      --radius-pill: 999px;

      --shadow-soft: 0 16px 40px rgba(0, 0, 0, 0.55);
      --transition-fast: 0.18s ease-out;

      --accent: #22d3ee;
      --accent-soft: rgba(34, 211, 238, 0.15);
      --accent-strong: #06b6d4;

      --good:#22c55e;
      --warn:#facc15;
      --bad:#ef4444;
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    html, body{ height:100%; }

    body{
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)),
        url("philo.jpg") no-repeat center center fixed;
      background-size: cover;
      backdrop-filter: blur(6px);
      color: var(--text);
      min-height: 100vh;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 30% 20%, rgba(34, 211, 238, 0.12), transparent 60%),
        radial-gradient(circle at 80% 70%, rgba(34, 211, 238, 0.1), transparent 70%);
      pointer-events:none;
      z-index:0;
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background: radial-gradient(circle at center, rgba(0,0,0,0) 40%, rgba(0,0,0,0.35) 100%);
      z-index:0;
    }

    .hidden{ display:none !important; }

    /* =========================================================
       SHELL
       ========================================================= */
    .app-shell{
      width:100%;
      padding:16px;
      display:flex;
      justify-content:center;
      position:relative;
      z-index:1;
    }
    .app-inner{
      width:100%;
      max-width:1200px;
      display:flex;
      flex-direction:column;
      gap:16px;
      padding:18px 18px 14px;
      margin:0 auto;
      background: linear-gradient(135deg, rgba(15,23,42,0.98), rgba(15,23,42,0.90));
      border-radius:24px;
      box-shadow: var(--shadow-soft);
      border:1px solid rgba(148,163,184,0.35);
      backdrop-filter: blur(18px);
      position:relative;
      z-index:1;
    }

    .footer{
      margin-top:14px;
      font-size:0.75rem;
      color:#6b7280;
      text-align:right;
    }

    /* =========================================================
       SPLASH (responsive bigger logo + no border line)
       ========================================================= */
    .splash{
      min-height:80vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
      user-select:none;
    }
    .splash-logo-wrap{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      animation: splashIn 0.9s ease-out both;
    }
    @keyframes splashIn{
      from{ opacity:0; transform: translateY(10px) scale(.96); }
      to{ opacity:1; transform: translateY(0) scale(1); }
    }

    .splash-glow{
      position:absolute;
      width: clamp(210px, 46vw, 280px);
      height: clamp(210px, 46vw, 280px);
      border-radius:50%;
      background: radial-gradient(circle,
        rgba(34,211,238,.55) 0%,
        rgba(34,211,238,.35) 35%,
        rgba(34,211,238,.15) 55%,
        rgba(34,211,238,0) 72%
      );
      filter: blur(16px);
      animation: glowPulse 2.6s ease-in-out infinite;
      z-index:1;
    }
    @keyframes glowPulse{
      0%{ transform:scale(.85); opacity:.55; }
      50%{ transform:scale(1.05); opacity:.9; }
      100%{ transform:scale(.85); opacity:.55; }
    }

    .splash-logo{
      width: clamp(170px, 38vw, 230px);
      height: clamp(170px, 38vw, 230px);
      border-radius:34px;
      object-fit:cover;
      border:none !important;
      outline:none !important;
      box-shadow:
        0 22px 70px rgba(0,0,0,0.85),
        0 0 0 1px rgba(255,255,255,0.06) inset;
      position:relative;
      z-index:2;
    }
    .splash-hint{
      font-size:.8rem;
      color:var(--muted);
      letter-spacing:.2em;
      text-transform:uppercase;
    }

    /* =========================================================
       HEADER / TOPBAR
       ========================================================= */
    .header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }
    .header-left{
      display:flex;
      align-items:center;
      gap:14px;
    }

    /* Header logo bigger + no border line */
    .logo{
      width:60px;
      height:60px;
      border-radius:18px;
      object-fit:cover;
      border:none !important;
      outline:none !important;
      box-shadow:
        0 14px 36px rgba(0,0,0,0.72),
        0 0 0 1px rgba(255,255,255,0.06) inset;
    }

    .title-block{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .title-block h1{
      font-size:1.35rem;
      font-weight:800;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:var(--heading);
    }
    .subtitle{
      font-size:0.9rem;
      color:var(--muted);
    }
    .header-pill{
      padding:6px 12px;
      border-radius: var(--radius-pill);
      border:1px solid rgba(148,163,184,0.4);
      font-size:0.75rem;
      color:var(--muted);
      background: radial-gradient(circle at top left, rgba(34,211,238,0.08), transparent 55%);
      white-space:nowrap;
    }

    /* =========================================================
       TABS
       ========================================================= */
    .tabs{
      display:flex;
      gap:8px;
      border-bottom:1px solid rgba(15,23,42,0.9);
      padding-bottom:4px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
    }
    .tabs::-webkit-scrollbar{ display:none; }

    .tab{
      position:relative;
      padding:8px 16px;
      font-size:0.9rem;
      border-radius:999px;
      background: rgba(15,23,42,0.6);
      border:1px solid transparent;
      color:var(--muted);
      cursor:pointer;
      white-space:nowrap;
      display:inline-flex;
      align-items:center;
      gap:6px;
      transition:
        color var(--transition-fast),
        background var(--transition-fast),
        border-color var(--transition-fast),
        box-shadow var(--transition-fast),
        transform var(--transition-fast);
    }
    .tab:hover{
      color:var(--heading);
      background: rgba(15,23,42,0.9);
      border-color: rgba(148,163,184,0.4);
      box-shadow: 0 6px 18px rgba(0,0,0,0.5);
      transform: translateY(-1px);
    }
    .tab.active{
      color:var(--heading);
      background: radial-gradient(circle at top left, rgba(34,211,238,0.32), rgba(15,23,42,0.98));
      border-color: rgba(34,211,238,0.8);
      box-shadow: 0 10px 32px rgba(15,23,42,0.9);
    }

    /* =========================================================
       GLASS PANEL
       ========================================================= */
    .glass-panel{
      background: var(--card-glass);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(16px);
      padding: 14px;
    }

    /* =========================================================
       MAP LAYOUT
       ========================================================= */
    #storeMap{
      width:100%;
      height: 62vh;
      min-height:520px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(148,163,184,0.35);
      overflow:hidden;
      box-shadow: 0 18px 42px rgba(0,0,0,0.85);
      position:relative;
    }
    .map-layout{
      display:grid;
      grid-template-columns: 1fr 360px;
      gap:12px;
      margin-top: 10px;
    }
    @media (max-width: 900px){
      .map-layout{ grid-template-columns: 1fr; }
    }

    .store-panel{
      background: var(--card-glass);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-soft);
      padding: 14px;
      backdrop-filter: blur(16px);
    }

    /* Map loading overlay */
    .map-loading{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:10px;
      background: rgba(2,6,23,0.55);
      backdrop-filter: blur(8px);
      z-index: 500;
      color: var(--heading);
    }
    .spinner{
      width:34px; height:34px;
      border-radius:50%;
      border:3px solid rgba(148,163,184,0.35);
      border-top-color: rgba(34,211,238,0.95);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg);} }

    /* Store KV rows (missing in original CSS; now added) */
    .kv{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:10px 10px;
      margin-top:8px;
      border-radius:12px;
      border:1px solid var(--border-soft);
      background: linear-gradient(135deg, rgba(2,6,23,.35), rgba(15,23,42,.35));
    }
    .kv span:first-child{
      color: var(--muted);
      font-size:.85rem;
      letter-spacing:.06em;
      text-transform:uppercase;
    }
    .kv span:last-child{
      font-weight:800;
      color: var(--heading);
    }

    /* markers (original) */
    .pin{
      width:18px;height:18px;border-radius:999px;
      border:2px solid rgba(255,255,255,.85);
      box-shadow:0 6px 18px rgba(0,0,0,.7);
      position:relative;
      background: var(--bad);
    }
    .pin-ok{ background: var(--good); }
    .pin-warn{ background: var(--warn); }
    .pin-bad{ background: var(--bad); }
    .pin .flagpole{
      position:absolute; left:8px; top:-14px;
      width:2px; height:14px;
      background: rgba(255,255,255,.85);
      border-radius:2px;
      box-shadow:0 6px 14px rgba(0,0,0,.5);
    }
    .pin .flagpole::after{
      content:"";
      position:absolute; top:2px; left:2px;
      width:12px; height:8px;
      background: var(--bad);
      clip-path: polygon(0 0, 100% 18%, 0 50%, 100% 82%, 0 100%);
      border-radius:2px;
      box-shadow:0 6px 14px rgba(0,0,0,.55);
    }

    /* popups (original) */
    .popup-backdrop{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,0.75);
      display:none;
      align-items:flex-start;
      justify-content:center;
      z-index:9999;
      padding:24px 16px;
      backdrop-filter: blur(8px);
      overflow-y:auto;
    }
    .popup{
      background: radial-gradient(circle at top left, #020617 0, #020617 35%, #02040a 100%);
      padding: 20px 20px 16px;
      border-radius: 20px;
      border: 1px solid rgba(148,163,184,0.6);
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y:auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.9);
    }
    .popup h2{
      font-size:1.1rem;
      font-weight:800;
      margin-bottom:4px;
      color:var(--heading);
    }
    .popup-subtitle{
      font-size:0.8rem;
      color:var(--muted);
      margin-bottom:10px;
      font-style:italic;
    }
    .popup-close{
      margin-top:14px;
      background: linear-gradient(135deg, var(--accent-strong), #3b82f6);
      color:#020617;
      border:none;
      border-radius: var(--radius-pill);
      padding: 9px 16px;
      cursor:pointer;
      font-size:0.85rem;
      font-weight:700;
      box-shadow: 0 12px 30px rgba(37,99,235,0.7);
      transition: transform var(--transition-fast), filter var(--transition-fast);
    }
    .popup-close:hover{ filter: brightness(1.07); transform: translateY(-1px); }
    .popup-close:active{ transform: translateY(0) scale(.99); }

    /* Inputs (add-on polish) */
    input[type="text"], input[type="password"], input[type="search"], textarea, select{
      background: rgba(2, 6, 23, 0.55);
      color: var(--heading);
      border: 1px solid rgba(148,163,184,0.35);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }
    input::placeholder{ color: rgba(156,163,175,0.75); }
    input:focus, textarea:focus, select:focus{
      border-color: rgba(34,211,238,0.9);
      box-shadow: 0 0 0 4px rgba(34,211,238,0.18);
    }
    :focus-visible{
      outline: 3px solid rgba(34,211,238,0.9);
      outline-offset: 3px;
      border-radius: 10px;
    }

    @media (prefers-reduced-motion: reduce){
      *{
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* Bubble grid used by SKU catalogue */
    .bubble-grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap:10px;
    }
    @media (max-width: 980px){
      .bubble-grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px){
      .bubble-grid{ grid-template-columns: 1fr; }
    }

    /* =========================================================
       MAP SEARCH / FILTER UI (add-on)
       ========================================================= */
    .store-search{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .search-wrap{
      position:relative;
      flex: 1 1 360px;
      min-width: 260px;
    }
    .search-input{
      width:100%;
      padding:10px 12px;
      border-radius: 14px;
      border:1px solid rgba(148,163,184,0.35);
      background: rgba(2, 6, 23, 0.55);
      color: var(--heading);
    }
    .search-results{
      position:absolute;
      top: calc(100% + 8px);
      left:0; right:0;
      z-index: 1000;
      background: rgba(2,6,23,0.92);
      border:1px solid rgba(148,163,184,0.45);
      border-radius: 16px;
      box-shadow: 0 18px 46px rgba(0,0,0,0.7);
      overflow:hidden;
      display:none;
      max-height: 360px;
      overflow-y:auto;
    }
    .search-results.show{ display:block; }
    .search-item{
      padding:10px 12px;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      cursor:pointer;
      border-bottom: 1px solid rgba(148,163,184,0.12);
    }
    .search-item:last-child{ border-bottom:none; }
    .search-item:hover,
    .search-item.active{ background: rgba(34,211,238,0.10); }
    .search-title{ font-weight: 850; color: var(--heading); line-height:1.1; }
    .search-sub{ color: var(--muted); font-size: .82rem; }
    .chips{ display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
    .chip{
      font-size:.72rem;
      padding:3px 8px;
      border-radius: 999px;
      border:1px solid rgba(148,163,184,0.35);
      color: var(--muted);
      background: rgba(15,23,42,0.55);
      white-space:nowrap;
    }
    .chip.good{ border-color: rgba(34,197,94,0.55); color: rgba(34,197,94,0.95); }
    .chip.warn{ border-color: rgba(250,204,21,0.55); color: rgba(250,204,21,0.95); }
    .chip.bad{  border-color: rgba(239,68,68,0.55);  color: rgba(239,68,68,0.95); }

    .pill-toggle{
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding:8px 12px;
      border-radius: 999px;
      border:1px solid rgba(148,163,184,0.35);
      background: rgba(15,23,42,0.55);
      color: var(--muted);
      font-size: .82rem;
      cursor:pointer;
      user-select:none;
      transition: transform var(--transition-fast), background var(--transition-fast), color var(--transition-fast);
      white-space:nowrap;
    }
    .pill-toggle:hover{
      transform: translateY(-1px);
      color: var(--heading);
      background: rgba(15,23,42,0.85);
    }
    .pill-toggle input{ transform: translateY(1px); accent-color: var(--accent); }

    /* =========================================================
       HF SEASONAL BANNER + PERENNIAL SMART FILTERS (add-on)
       ========================================================= */
    .hf-seasonal{
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(34,211,238,.55);
      background: radial-gradient(circle at top left, rgba(34,211,238,.22), rgba(15,23,42,.95));
      box-shadow: 0 12px 30px rgba(0,0,0,.6);
      font-size:.9rem;
    }
    .hf-seasonal strong{
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .hf-toolbar{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .hf-toolbar input[type="search"]{
      width:100%;
      padding:10px 12px;
      border-radius:14px;
    }
    .hf-count{
      color: var(--muted);
      font-size:.85rem;
      white-space:nowrap;
    }
    .card-grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap:10px;
    }
    @media (max-width: 980px){ .card-grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 560px){ .card-grid{ grid-template-columns: 1fr; } }

    .card{
      background: var(--card-glass);
      border: 1px solid var(--border-soft);
      border-radius: 14px;
      box-shadow: var(--shadow-soft);
      padding: 12px;
      cursor: pointer;
      transition: transform var(--transition-fast), background var(--transition-fast), border-color var(--transition-fast);
    }
    .card:hover{
      transform: translateY(-1px);
      border-color: rgba(34,211,238,0.55);
      background: rgba(15,23,42,0.85);
    }
    .card-title{ font-weight: 900; color: var(--heading); }
    .card-sub{ color: var(--muted); font-size: .85rem; margin-top: 4px; }
    .filter-bar{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .filter-chip{
      padding:6px 12px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,0.35);
      background: rgba(15,23,42,0.55);
      color: var(--muted);
      font-size:.8rem;
      cursor:pointer;
      user-select:none;
      transition: all .15s ease;
    }
    .filter-chip:hover{ color:var(--heading); transform: translateY(-1px); }
    .filter-chip.active{
      color:#020617;
      background: linear-gradient(135deg, var(--accent-strong), #3b82f6);
      border-color: transparent;
      box-shadow: 0 6px 18px rgba(37,99,235,.55);
    }

    /* Print care cards */
    @media print{
      body{ background:#fff !important; color:#000 !important; }
      .tabs, #topbar, #globalTabs, .footer, .map-layout, #storeMap, #view-map .glass-panel:first-child { display:none !important; }
      .popup, .hf-modal{
        box-shadow:none !important;
        border:1px solid #ccc !important;
        max-width:100% !important;
      }
    }
  </style>
</head>

<body>
<div class="app-shell">
  <div class="app-inner">

    <!-- =====================================================
         SPLASH
         ===================================================== -->
    <section id="view-splash" class="splash">
      <div class="splash-logo-wrap" id="splashEnter" role="button" aria-label="Enter Hub" tabindex="0">
        <div class="splash-glow"></div>
        <img src="hf_logo.png" alt="HF Logo" class="splash-logo" />
      </div>
      <div class="splash-hint">Tap to continue</div>
    </section>

    <!-- =====================================================
         LOGIN
         ===================================================== -->
    <section id="view-login" class="hidden">
      <div class="glass-panel" style="max-width:380px;margin:0 auto;">
        <img src="hf_logo.png" alt="HF Logo" class="logo" style="margin-bottom:10px;" />

        <h2>Sign In</h2>
        <div class="popup-subtitle">Internal Tool</div>

        <div style="margin-top:12px;">
          <label class="popup-subtitle">Username</label>
          <input id="loginUser" type="text" autocomplete="username"
                 style="width:100%;padding:10px;border-radius:12px;margin-top:4px;" />
        </div>

        <div style="margin-top:10px;">
          <label class="popup-subtitle">Password</label>
          <input id="loginPass" type="password" autocomplete="current-password"
                 style="width:100%;padding:10px;border-radius:12px;margin-top:4px;" />
        </div>

        <button id="loginBtn" class="popup-close" style="width:100%;margin-top:14px;">
          Login
        </button>

        <div id="loginError" style="margin-top:8px;color:#ef4444;font-size:.85rem;"></div>
      </div>
    </section>

    <!-- =====================================================
         HEADER / NAV
         ===================================================== -->
    <header id="topbar" class="hidden header">
      <div class="header-left">
        <img src="hf_logo.png" alt="HF Logo" class="logo" />
        <div class="title-block">
          <h1>Merchandising Hub</h1>
          <div class="subtitle">Live Map • HF • HPA • Training</div>
        </div>
      </div>
      <div class="header-pill" id="userPill">User</div>
    </header>

    <!-- =====================================================
         GLOBAL TABS
         ===================================================== -->
    <nav id="globalTabs" class="tabs hidden">
      <button class="tab active" data-view="map">MAP</button>
      <button class="tab" data-view="hf">HF</button>

<script>
/* =========================================================
   SEGMENT 3 — APP BOOT + LOGIN + NAV (SUPERSET)
   + remember last view
   + splash keyboard support
   + guarded tab binding
   ========================================================= */

const App = {
  user: null,
  view: "splash",
  firebaseReady: false,
  firestoreReady: false
};

const VIEWS = ["splash","login","map","hf","hpa","admin","training"];

const $ = (id) => document.getElementById(id);

function showView(view){
  VIEWS.forEach(v=>{
    const el = $("view-" + v);
    if(el) el.classList.toggle("hidden", v !== view);
  });

  document.querySelectorAll(".tab[data-view]").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.view === view);
  });

  App.view = view;
  try{ sessionStorage.setItem("hub_view", view); }catch{}
}

function setUserPill(name){
  const pill = $("userPill");
  if(pill) pill.textContent = name || "User";
}

/* Splash accessibility */
(function wireSplash(){
  const splash = $("splashEnter");
  if(!splash) return;

  splash.addEventListener("click", (e)=>{
    e.preventDefault();
    showView("login");
  });
  splash.addEventListener("keydown", (e)=>{
    if(e.key === "Enter" || e.key === " "){
      e.preventDefault();
      showView("login");
    }
  });
})();

/* CSV parser (original robust parser) */
function parseCSV(text){
  const rows = [];
  let row = [], val = "", inQuotes = false;

  for(let i=0;i<text.length;i++){
    const c = text[i];
    const n = text[i+1];

    if(c === '"' && inQuotes && n === '"'){
      val += '"'; i++;
    } else if(c === '"'){
      inQuotes = !inQuotes;
    } else if(c === "," && !inQuotes){
      row.push(val); val="";
    } else if((c === "\n" || c === "\r") && !inQuotes){
      if(val || row.length){
        row.push(val);
        rows.push(row);
        row=[]; val="";
      }
    } else {
      val += c;
    }
  }
  if(val || row.length){
    row.push(val);
    rows.push(row);
  }
  return rows;
}

/* Login users.csv (original behavior preserved incl demo fallback) */
async function loadUsers(){
  try{
    const txt = await fetch("users.csv", { cache:"no-store" }).then(r=>r.text());
    const rows = parseCSV(txt);
    const header = rows[0].map(h=>String(h).toLowerCase());

    const uIdx = header.indexOf("username");
    const pIdx = header.indexOf("password");

    return rows.slice(1).map(r=>({
      username: (r[uIdx]||"").trim().toLowerCase(),
      password: (r[pIdx]||"").trim()
    })).filter(u=>u.username && u.password);
  }catch{
    return [{ username:"demo", password:"demo" }];
  }
}

async function doLogin(){
  const user = $("loginUser").value.trim().toLowerCase();
  const pass = $("loginPass").value.trim();
  const err = $("loginError");
  err.textContent = "";

  if(!user || !pass){
    err.textContent = "Enter username and password.";
    return;
  }

  const users = await loadUsers();
  const match = users.find(u=>u.username===user && u.password===pass);

  if(!match){
    err.textContent = "Invalid credentials.";
    return;
  }

  App.user = { username:user };
  sessionStorage.setItem("hub_user", JSON.stringify(App.user));

  $("topbar").classList.remove("hidden");
  $("globalTabs").classList.remove("hidden");
  setUserPill(user);

  const last = sessionStorage.getItem("hub_view");
  showView(VIEWS.includes(last) ? last : "map");
}

$("loginBtn")?.addEventListener("click", doLogin);
$("loginPass")?.addEventListener("keydown", e=>{
  if(e.key === "Enter") doLogin();
});

/* Logout */
$("logoutBtn")?.addEventListener("click", ()=>{
  App.user = null;
  sessionStorage.removeItem("hub_user");
  sessionStorage.removeItem("hub_view");

  $("topbar").classList.add("hidden");
  $("globalTabs").classList.add("hidden");

  showView("splash");
});

/* Global view nav (guarded to prevent duplicate binds) */
document.querySelectorAll(".tab[data-view]").forEach(btn=>{
  if(btn.dataset.bound === "1") return;
  btn.dataset.bound = "1";
  btn.addEventListener("click", ()=>{
    const view = btn.dataset.view;
    showView(view);
  });
});

/* Firebase bootstrap (original approach preserved) */
(function initFirebase(){
  // firebaseConfig defined in Segment 4 (original)
  // If missing, continue offline
  if(!window.firebaseConfig){
    console.warn("⚠️ firebaseConfig not found — running in local-only mode");
    return;
  }
  // firebase compat libs are loaded in Segment 4 ensureFirestore()
})();

/* Session restore */
(function restoreSession(){
  try{
    const raw = sessionStorage.getItem("hub_user");
    if(raw){
      App.user = JSON.parse(raw);
      $("topbar").classList.remove("hidden");
      $("globalTabs").classList.remove("hidden");
      setUserPill(App.user.username);

      const v = sessionStorage.getItem("hub_view");
      showView(VIEWS.includes(v) ? v : "map");
      return;
    }
  }catch{}
  showView("splash");
})();
</script>

<script>
/* =========================================================
   SEGMENT 4 — LIVE MAP (Leaflet + Firestore Live) SUPERSET
   + Monday weekly reset
   + Map loader overlay hide
   + Marker tooltip
   + Store search/filter dropdown wired to LiveMap API
   ========================================================= */

/* Firestore config (original) */
window.firebaseConfig = window.firebaseConfig || {
  apiKey: "AIzaSyCbEnGdIr43SJ0iItI-jqTC3Do0hT0gk_Y",
  authDomain: "live-map-82f69.firebaseapp.com",
  databaseURL: "https://live-map-82f69-default-rtdb.firebaseio.com",
  projectId: "live-map-82f69",
  storageBucket: "live-map-82f69.firebasestorage.app",
  messagingSenderId: "138303920091",
  appId: "1:138303920091:web:87065d8dae4dadd72a79fe"
};

const $$ = (id) => document.getElementById(id);
const sleep = (ms) => new Promise(r => setTimeout(r, ms));
const todayKey = () => new Date().toISOString().slice(0,10);
const uid = () => (crypto?.randomUUID?.()) || (String(Date.now()) + Math.random().toString(16).slice(2));

function safeText(el, text){ if(el) el.textContent = text ?? ""; }
function escHtml(s){
  return String(s ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

/* -----------------------------
   Weekly reset: restart every Monday (local state)
   ----------------------------- */
function mondayKey(d = new Date()){
  const date = new Date(d);
  const day = date.getDay(); // 0=Sun, 1=Mon
  const diff = (day === 0 ? -6 : 1) - day;
  date.setDate(date.getDate() + diff);
  return date.toISOString().slice(0,10);
}
const WEEK_KEY_STORAGE = "hub_last_week_key_v1";
const LOCAL_STATE_KEY = "hub_store_live_state_v1";

(function weeklyMapReset(){
  try{
    const currentWeek = mondayKey();
    const lastWeek = localStorage.getItem(WEEK_KEY_STORAGE);
    if(lastWeek !== currentWeek){
      console.log("🔄 New week detected — resetting map state (local)");
      localStorage.removeItem(LOCAL_STATE_KEY);
      localStorage.setItem(WEEK_KEY_STORAGE, currentWeek);
    }
  }catch(e){
    console.warn("Weekly reset check failed", e);
  }
})();

/* -----------------------------
   Load external libs safely
   ----------------------------- */
function loadCssOnce(href){
  return new Promise(resolve=>{
    if([...document.querySelectorAll('link[rel="stylesheet"]')].some(l=>l.href===href)) return resolve();
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = href;
    link.onload = resolve;
    link.onerror = resolve;
    document.head.appendChild(link);
  });
}
function loadScriptOnce(src){
  return new Promise(resolve=>{
    if([...document.scripts].some(s=>s.src===src)) return resolve();
    const s = document.createElement("script");
    s.src = src;
    s.defer = true;
    s.onload = resolve;
    s.onerror = resolve;
    document.head.appendChild(s);
  });
}
async function ensureLeaflet(){
  await loadCssOnce("https://unpkg.com/leaflet@1.9.4/dist/leaflet.css");
  await loadScriptOnce("https://unpkg.com/leaflet@1.9.4/dist/leaflet.js");
  for(let i=0;i<80;i++){
    if(window.L && typeof L.map === "function") return true;
    await sleep(50);
  }
  console.warn("[leaflet] failed to load");
  return false;
}
async function ensureFirestore(){
  await loadScriptOnce("https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js");
  await loadScriptOnce("https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js");

  for(let i=0;i<80;i++){
    if(window.firebase && firebase.initializeApp && firebase.firestore) break;
    await sleep(50);
  }
  if(!window.firebase || !firebase.initializeApp || !firebase.firestore){
    console.warn("[firebase] compat libs not available; local-only mode");
    return false;
  }
  try{
    if(!firebase.apps?.length) firebase.initializeApp(window.firebaseConfig);
    window.db = firebase.firestore();
    App.firebaseReady = true;
    App.firestoreReady = true;
    return true;
  }catch(e){
    console.warn("[firebase] init failed; local-only mode", e);
    return false;
  }
}

/* -----------------------------
   Live store state (original, with local + remote merge)
   ----------------------------- */
const LiveState = {
  local: (()=>{ try{return JSON.parse(localStorage.getItem(LOCAL_STATE_KEY)||"{}");}catch{return {}; } })(),
  remote: {},

  defaults(){
    return {
      watered:false,
      wateredOn:null,
      negatives:false,
      pictures:false,
      checklist:{},
      issues:[],
      updatedAt:null,
      updatedBy:null
    };
  },

  saveLocal(){
    try{ localStorage.setItem(LOCAL_STATE_KEY, JSON.stringify(this.local)); }catch{}
  },

  ensure(id){
    if(!this.local[id]) this.local[id] = this.defaults();
    const st = this.local[id];
    if(!st.checklist || typeof st.checklist !== "object") st.checklist = {};
    if(!Array.isArray(st.issues)) st.issues = [];
    if(st.wateredOn !== todayKey()) st.watered = false;
    return st;
  },

  get(id){
    const r = this.remote[id];
    if(r){
      const merged = { ...this.defaults(), ...r };
      if(merged.wateredOn !== todayKey()) merged.watered = false;
      if(!merged.checklist || typeof merged.checklist !== "object") merged.checklist = {};
      if(!Array.isArray(merged.issues)) merged.issues = [];
      return merged;
    }
    return this.ensure(id);
  },

  async set(id, patch){
    const cur = this.get(id);
    const next = {
      ...cur,
      ...patch,
      updatedAt: Date.now(),
      updatedBy: App.user?.username || "User"
    };

    this.local[id] = next;
    this.saveLocal();

    if(App.firestoreReady && window.db){
      try{
        await db.collection("stores").doc(id).set(next, { merge:true });
      }catch(e){
        console.warn("[firestore] write failed; kept local", e);
      }
    }
    return next;
  }
};

/* scoring + marker style (original) */
function openIssuesCount(st){ return (st.issues||[]).filter(i=>!i.resolved).length; }
function completionEstimate(st){
  let done = 0;
  let total = 3;
  if(st.watered && st.wateredOn === todayKey()) done++;
  if(!!st.negatives) done++;
  if(!!st.pictures) done++;

  const ckVals = st.checklist && typeof st.checklist === "object" ? Object.values(st.checklist) : [];
  if(ckVals.length){
    total += ckVals.length;
    ckVals.forEach(v=>{ if(v===true) done++; });
  }
  return total ? done/total : 0;
}
function markerStyleFor(st){
  if(openIssuesCount(st) > 0) return { cls:"pin-warn", flag:true };
  const pct = completionEstimate(st);
  if(pct >= 1) return { cls:"pin-ok", flag:false };
  if(pct >= 0.5) return { cls:"pin-warn", flag:false };
  return { cls:"pin-bad", flag:false };
}

/* -----------------------------
   Live Map module (original + API exposure for search)
   ----------------------------- */
const LiveMap = (() => {
  let map = null;
  let stores = [];
  let markers = new Map();
  let selectedId = null;
  let started = false;

  function mapVisible(){
    const v = $$("view-map");
    return v && !v.classList.contains("hidden");
  }

  async function loadStores(){
    try{
      const txt = await fetch("stores.csv", { cache:"no-store" }).then(r=>{
        if(!r.ok) throw new Error("stores.csv missing");
        return r.text();
      });

      const rows = parseCSV(txt);
      const header = rows[0].map(h=>String(h).toLowerCase().trim());
      const idIdx = header.indexOf("store_id");
      const nameIdx = header.indexOf("store_name");
      const latIdx = header.indexOf("lat");
      const lonIdx = header.indexOf("lon");
      const cityIdx = header.indexOf("city");
      const stIdx = header.indexOf("state");

      stores = rows.slice(1).map(r=>({
        id: (r[idIdx]||"").trim(),
        name: (r[nameIdx]||"").trim(),
        lat: parseFloat((r[latIdx]||"").trim()),
        lon: parseFloat((r[lonIdx]||"").trim()),
        city: (r[cityIdx]||"").trim(),
        state: (r[stIdx]||"").trim()
      })).filter(s => s.id && s.name && !Number.isNaN(s.lat) && !Number.isNaN(s.lon));

      if(!stores.length) throw new Error("no stores parsed");
    }catch(e){
      console.warn("[stores] fallback demo", e);
      stores = [
        { id:"1950", name:"South Loop", lat:41.856, lon:-87.624, city:"Chicago", state:"IL" },
        { id:"1987", name:"Glenview",  lat:42.079, lon:-87.822, city:"Glenview", state:"IL" }
      ];
    }
    window.AppStores = stores;
  }

  function ensureMap(){
    if(map) return;
    const el = $$("storeMap");
    if(!el) return;

    map = L.map(el, { zoomControl:true, preferCanvas:true });
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom:19 }).addTo(map);
  }

  function pinHtml(storeId){
    const st = LiveState.get(storeId);
    const m = markerStyleFor(st);
    return `<div class="pin ${m.cls}">${m.flag ? `<span class="flagpole"></span>` : ""}</div>`;
  }

  function renderMarkers(){
    markers.forEach(m=>map.removeLayer(m));
    markers.clear();

    const bounds = [];
    stores.forEach(s=>{
      const icon = L.divIcon({ className:"", html: pinHtml(s.id), iconSize:[18,18], iconAnchor:[9,9] });
      const m = L.marker([s.lat,s.lon], { icon }).addTo(map);
      m.on("click", ()=> selectStore(s.id));
      m.bindTooltip(`${s.name} (${s.id})`, { direction:"top", opacity:0.9 }); /* add-on */
      markers.set(s.id, m);
      bounds.push([s.lat,s.lon]);
    });

    if(bounds.length) map.fitBounds(bounds, { padding:[22,22] });
  }

  function updateMarker(storeId){
    const m = markers.get(storeId);
    if(!m) return;
    const icon = L.divIcon({ className:"", html: pinHtml(storeId), iconSize:[18,18], iconAnchor:[9,9] });
    m.setIcon(icon);
  }

  function updateAll(){ stores.forEach(s=> updateMarker(s.id)); }

  async function addIssue(storeId, msg){
    const cur = LiveState.get(storeId);
    const issues = Array.isArray(cur.issues) ? [...cur.issues] : [];
    issues.push({
      id: uid(),
      text: msg.trim(),
      createdAt: Date.now(),
      createdBy: App.user?.username || "User",
      resolved: false
    });
    await LiveState.set(storeId, { issues });
  }

  function selectStore(storeId){
    selectedId = storeId;
    const store = stores.find(s=>s.id===storeId);
    if(!store) return;

    window.SelectedStore = store;

    const st = LiveState.get(storeId);
    safeText($$("spTitle"), `${store.name} (${store.id})`);
    safeText($$("spSub"), [store.city, store.state].filter(Boolean).join(", ") || "—");
    safeText($$("spWatered"), (st.watered && st.wateredOn===todayKey()) ? "✅" : "❌");
    safeText($$("spNegatives"), st.negatives ? "⚠️" : "✅");

    const oc = openIssuesCount(st);
    safeText($$("spIssues"), oc ? `🚩 ${oc}` : "✅ None");

    const btn = $$("btnAddIssue");
    btn.disabled = false;
    btn.onclick = async () => {
      const msg = prompt("Enter issue details:");
      if(!msg) return;
      await addIssue(storeId, msg);
      const after = LiveState.get(storeId);
      safeText($$("spIssues"), `🚩 ${openIssuesCount(after)}`);
      updateMarker(storeId);
    };

    // checklist render hook (Segment 5)
  }

  function hookView(){
    const v = $$("view-map");
    if(!v) return;

    const obs = new MutationObserver(()=>{
      if(mapVisible()){
        if(map) setTimeout(()=> map.invalidateSize(), 80);
        if(!started) start();
      }
    });
    obs.observe(v, { attributes:true, attributeFilter:["class"] });
  }

  async function start(){
    started = true;

    const okL = await ensureLeaflet();
    if(!okL) return;

    await loadStores();
    ensureMap();
    renderMarkers();

    // hide loading overlay
    const ml = document.getElementById("mapLoading");
    if(ml) ml.style.display = "none";

    requestAnimationFrame(()=> setTimeout(()=> map.invalidateSize(), 60));

    // Firestore listener (original)
    if(App.firestoreReady && window.db){
      db.collection("stores").onSnapshot((snap)=>{
        snap.forEach(doc=>{
          LiveState.remote[doc.id] = doc.data();
        });
        updateAll();

        if(selectedId){
          const st = LiveState.get(selectedId);
          safeText($$("spWatered"), (st.watered && st.wateredOn===todayKey()) ? "✅" : "❌");
          safeText($$("spNegatives"), st.negatives ? "⚠️" : "✅");
          const oc = openIssuesCount(st);
          safeText($$("spIssues"), oc ? `🚩 ${oc}` : "✅ None");
        }
      }, (err)=>{

      });

  // API exposed for store search box
  function getStores(){ return stores || []; }
  function getMap(){ return map; }
  function flyToStore(id){
    const s = stores.find(x=>x.id===id);
    if(!s || !map) return false;
    map.flyTo([s.lat, s.lon], Math.max(map.getZoom(), 12), { duration: 0.6 });
    return true;
  }

  return { hookView, start, updateAll, getStores, getMap, flyToStore, selectStore };
})();

/* =========================================================
   MAP SEARCH / FILTER MODULE (add-on)
   ========================================================= */
(function initStoreSearch(){
  const input = document.getElementById("storeSearch");
  const resultsEl = document.getElementById("storeSearchResults");
  const chkIssuesOnly = document.getElementById("filterIssuesOnly");
  const btnClear = document.getElementById("clearSearch");
  if(!input || !resultsEl) return;

  let activeIndex = -1;
  let lastList = [];

  function norm(s){ return String(s||"").trim().toLowerCase(); }

  function storeMatches(s, q){
    if(!q) return true;
    const hay = [s.id, s.name, s.city, s.state].map(norm).join(" | ");
    return hay.includes(q);
  }

  function openIssuesOnlyPass(s){
    if(!chkIssuesOnly?.checked) return true;
    const st = LiveState.get(s.id);
    return (st.issues||[]).some(i=>!i.resolved);
  }

  function statusChipFor(storeId){
    const st = LiveState.get(storeId);
    const issuesOpen = (st.issues||[]).filter(i=>!i.resolved).length;
    if(issuesOpen > 0) return { text:`🚩 ${issuesOpen} issues`, cls:"warn" };

    const pct = completionEstimate(st);
    if(pct >= 1) return { text:"✅ Complete", cls:"good" };
    if(pct >= 0.5) return { text:"🟡 In Progress", cls:"warn" };
    return { text:"🔴 Needs Work", cls:"bad" };
  }

  function showResults(list){
    lastList = list.slice(0, 12);
    activeIndex = -1;

    if(!lastList.length){
      resultsEl.innerHTML = `<div class="search-item" style="cursor:default;">
        <div>
          <div class="search-title">No matches</div>
          <div class="search-sub">Try another keyword (ID, name, city, state)</div>
        </div>
      </div>`;
      resultsEl.classList.add("show");
      input.setAttribute("aria-expanded","true");
      return;
    }

    resultsEl.innerHTML = lastList.map((s, idx)=>{
      const chip = statusChipFor(s.id);
      const sub = [s.city, s.state].filter(Boolean).join(", ") || "—";
      return `
        <div class="search-item" role="option" data-idx="${idx}">
          <div>
            <div class="search-title">${escHtml(s.name)} <span style="color:var(--muted);font-weight:700;">(${escHtml(s.id)})</span></div>
            <div class="search-sub">${escHtml(sub)}</div>
          </div>
          <div class="chips">
            <span class="chip ${chip.cls}">${escHtml(chip.text)}</span>
          </div>
        </div>
      `;
    }).join("");

    resultsEl.classList.add("show");
    input.setAttribute("aria-expanded","true");
  }

  function hideResults(){
    resultsEl.classList.remove("show");
    input.setAttribute("aria-expanded","false");
    activeIndex = -1;
  }

  function refresh(){
    const q = norm(input.value);
    const stores = LiveMap.getStores ? LiveMap.getStores() : (window.AppStores || []);
    const filtered = stores.filter(s => storeMatches(s, q)).filter(openIssuesOnlyPass);
    showResults(filtered);
  }

  function setActive(idx){
    activeIndex = idx;
    [...resultsEl.querySelectorAll(".search-item")].forEach(el => el.classList.remove("active"));
    const el = resultsEl.querySelector(`.search-item[data-idx="${idx}"]`);
    if(el){
      el.classList.add("active");
      el.scrollIntoView({ block:"nearest" });
    }
  }

  function choose(idx){
    const s = lastList[idx];
    if(!s) return;
    hideResults();
    LiveMap.flyToStore?.(s.id);
    LiveMap.selectStore?.(s.id);
    document.getElementById("spTitle")?.focus?.();
  }

  input.addEventListener("input", ()=>{
    if(!input.value.trim()){ hideResults(); return; }
    refresh();
  });

  input.addEventListener("focus", ()=>{
    if(input.value.trim()) refresh();
  });

  input.addEventListener("keydown", (e)=>{
    const items = resultsEl.querySelectorAll(".search-item[data-idx]");
    if(!resultsEl.classList.contains("show") && (e.key==="ArrowDown" || e.key==="Enter")){
      if(input.value.trim()) refresh();
    }
    if(e.key === "ArrowDown"){
      if(!items.length) return;
      e.preventDefault();
      const next = Math.min((activeIndex<0? -1 : activeIndex) + 1, items.length - 1);
      setActive(next);
    }else if(e.key === "ArrowUp"){
      if(!items.length) return;
      e.preventDefault();
      const next = Math.max((activeIndex<0? items.length : activeIndex) - 1, 0);
      setActive(next);
    }else if(e.key === "Enter"){
      if(activeIndex >= 0){ e.preventDefault(); choose(activeIndex); }
      else if(lastList.length === 1){ e.preventDefault(); choose(0); }
    }else if(e.key === "Escape"){
      hideResults();
    }
  });

  resultsEl.addEventListener("mousedown", (e)=>{
    const item = e.target.closest(".search-item[data-idx]");
    if(!item) return;
    choose(parseInt(item.dataset.idx, 10));
  });

  document.addEventListener("click", (e)=>{
    if(e.target === input) return;
    if(resultsEl.contains(e.target)) return;
    hideResults();
  });

  chkIssuesOnly?.addEventListener("change", ()=>{
    if(input.value.trim()) refresh();
    else { chkIssuesOnly.checked ? refresh() : hideResults(); }
  });

  btnClear?.addEventListener("click", ()=>{
    input.value = "";
    chkIssuesOnly && (chkIssuesOnly.checked = false);
    hideResults();
    input.focus();
  });

  // refresh dropdown chips when store states update
  const _origUpdateAll = LiveMap.updateAll?.bind(LiveMap);
  if(_origUpdateAll){
    LiveMap.updateAll = function(){
      _origUpdateAll();
      if(resultsEl.classList.contains("show")) refresh();
    };
  }
})();
</script>

/* Checklist schema (original) */
const ChecklistSchema = {
  loaded:false,
  items:[],
  async load(){
    if(this.loaded) return this.items;
    try{
      const txt = await fetch("checklist_items.csv",{cache:"no-store"}).then(r=>r.text());
      const rows = parseCSV(txt);
      const header = rows[0].map(h=>String(h).toLowerCase().trim());
      const idIdx = header.indexOf("item_id");
      const labelIdx = header.indexOf("label");
      const activeIdx = header.indexOf("active");

      this.items = rows.slice(1).map(r=>({
        id:(r[idIdx]||"").trim(),
        label:(r[labelIdx]||"").trim(),
        active:(String(r[activeIdx]||"true").toLowerCase()!=="false")
      })).filter(x=>x.id && x.label && x.active);
    }catch{
      this.items = [];
    }
    this.loaded = true;
    return this.items;
  }
};

function completionScore(st){
  let done = 0;
  let total = 3;
  if(st.watered && st.wateredOn===todayKey()) done++;
  if(st.negatives) done++;
  if(st.pictures) done++;
  const dyn = Object.values(st.checklist||{});
  total += dyn.length;
  dyn.forEach(v=>{ if(v===true) done++; });
  return { done, total, pct: total ? done/total : 0 };
}

/* Checklist UI create */
function ensureChecklistUI(){
  if(document.getElementById("checklistBox")) return;
  const panel = document.querySelector(".store-panel");
  if(!panel) return;

  const box = document.createElement("div");
  box.id = "checklistBox";
  box.className = "checklist-box";
  box.innerHTML = `
    <div class="checklist-title">Checklist</div>
    <div id="checklistRows"></div>
    <div class="check-meta">
      <span id="checkPct">0%</span>
      <span id="checkCount">0/0</span>
    </div>
    <button id="btnViewIssues" class="popup-close view-issues-btn hidden">
      🚩 View Issues
    </button>
  `;
  panel.insertBefore(box, document.getElementById("btnAddIssue"));
}

/* Render checklist */
async function renderChecklist(storeId){
  ensureChecklistUI();
  await ChecklistSchema.load();

  const st = LiveState.get(storeId);
  const rows = document.getElementById("checklistRows");

  const baseRows = [
    {key:"watered", label:"Watered (daily)"},
    {key:"negatives", label:"Negatives"},
    {key:"pictures", label:"Pictures"}
  ];

  const dynRows = ChecklistSchema.items.map(it=>({
    key:"dyn:"+it.id,
    label:it.label
  }));

  rows.innerHTML = [...baseRows, ...dynRows].map(r=>{
    let checked = false;
    if(r.key==="watered") checked = st.watered && st.wateredOn===todayKey();
    else if(r.key==="negatives") checked = !!st.negatives;
    else if(r.key==="pictures") checked = !!st.pictures;
    else checked = st.checklist[r.key.slice(4)]===true;

    return `
      <label class="check-row">
        <input type="checkbox" data-key="${r.key}" ${checked?"checked":""}/>
        <span>${r.label}</span>
      </label>
    `;
  }).join("");

  rows.onchange = async (e)=>{
    const cb = e.target.closest("input[data-key]");
    if(!cb) return;

    const key = cb.dataset.key;

    // operate on fresh state
    const cur = LiveState.get(storeId);

    if(key==="watered"){
      cur.watered = cb.checked;
      cur.wateredOn = cb.checked ? todayKey() : null;
    }else if(key==="negatives"){
      cur.negatives = cb.checked;
    }else if(key==="pictures"){
      cur.pictures = cb.checked;
    }else if(key.startsWith("dyn:")){
      cur.checklist[key.slice(4)] = cb.checked;
    }

    await LiveState.set(storeId, cur);
    updateStoreUI(storeId);
    LiveMap.updateAll();
  };

  updateChecklistMeta(storeId);
}

function updateChecklistMeta(storeId){
  const st = LiveState.get(storeId);
  const {done,total,pct} = completionScore(st);

  document.getElementById("checkPct").textContent = `${Math.round(pct*100)}%`;
  document.getElementById("checkCount").textContent = `${done}/${total}`;

  const hasIssues = (st.issues||[]).some(i=>!i.resolved);
  const btn = document.getElementById("btnViewIssues");
  btn.classList.toggle("hidden", !hasIssues);
  btn.onclick = ()=> openIssuesModal(storeId);
}

/* Issues modal (original) */
function openIssuesModal(storeId){
  let bd = document.getElementById("issuesBackdrop");
  if(!bd){
    bd = document.createElement("div");
    bd.id = "issuesBackdrop";
    bd.className = "popup-backdrop";
    bd.innerHTML = `
      <div class="popup">
        <h2>Store Issues</h2>
        <div id="issuesList"></div>
        <button class="popup-close" id="closeIssues">Close</button>
      </div>
    `;
    document.body.appendChild(bd);
    document.getElementById("closeIssues").onclick = ()=> bd.style.display="none";
    bd.onclick = (e)=>{ if(e.target===bd) bd.style.display="none"; };
  }

  const st = LiveState.get(storeId);
  const list = document.getElementById("issuesList");

  list.innerHTML = (st.issues||[]).map(i=>`
    <div class="glass-panel" style="margin-bottom:8px;">
      <strong>${escHtml(i.text)}</strong>
      <div class="popup-subtitle">
        ${new Date(i.createdAt).toLocaleString()} • ${escHtml(i.createdBy)}
      </div>
      ${!i.resolved ? `<button class="popup-close" data-resolve="${escHtml(i.id)}">Resolve</button>` : `<em>Resolved</em>`}
    </div>
  `).join("") || "<em>No issues.</em>";

  list.onclick = async (e)=>{
    const btn = e.target.closest("[data-resolve]");
    if(!btn) return;

    const cur = LiveState.get(storeId);
    const issue = cur.issues.find(x=>x.id===btn.dataset.resolve);
    if(issue){
      issue.resolved = true;
      await LiveState.set(storeId, cur);
      openIssuesModal(storeId);
      updateStoreUI(storeId);
      LiveMap.updateAll();
    }
  };

  bd.style.display="flex";
}

}

/* =========================================================
   HF PERENNIALS from hf_perennials.csv (add-on)
   - search by common/scientific/both
   - smart filters
   - printable care card
   ========================================================= */
const HF_SMART_TAGS = [
  { id:"sun", label:"Full Sun", match:/full sun/i },
  { id:"shade", label:"Shade", match:/shade/i },
  { id:"lowwater", label:"Low Water", match:/low water|drought/i },
  { id:"moist", label:"Moist Soil", match:/moist|consistent moisture/i },
  { id:"native", label:"Native", match:/native/i },
  { id:"pollinator", label:"Pollinator", match:/pollinator|butterfly|monarch|bee/i }
];

function ensureSimpleModal(){
  if(document.getElementById("infoModalBackdrop")) return;
  const bd = document.createElement("div");
  bd.id = "infoModalBackdrop";
  bd.className = "popup-backdrop";
  bd.innerHTML = `
    <div class="popup">
      <h2 id="infoModalTitle">Details</h2>
      <div class="popup-subtitle" id="infoModalSub">—</div>
      <div id="infoModalBody"></div>
      <button class="popup-close" id="infoModalClose">Close</button>
    </div>
  `;
  document.body.appendChild(bd);
  const close = ()=> bd.style.display="none";
  document.getElementById("infoModalClose").onclick = close;
  bd.onclick = (e)=>{ if(e.target===bd) close(); };
  document.addEventListener("keydown", (e)=>{
    if(e.key==="Escape" && bd.style.display==="flex") close();
  });
}

async function renderHFPerennialsFromCsv(){
  const mount = document.getElementById("hf-plants");
  if(!mount) return;

  const rows = await loadCsvSafe("hf_perennials.csv");
  if(!rows || rows.length < 2){
    mount.innerHTML = `<div class="glass-panel">No perennial data available (missing hf_perennials.csv).</div>`;
    return;
  }

  const header = rows[0].map(h => String(h).toLowerCase().trim());
  const idx = (name)=> header.indexOf(name);

  const idIdx   = idx("id");
  const cnIdx   = idx("common_name");
  const snIdx   = idx("scientific_name");
  const careIdx = idx("care");

  const items = rows.slice(1).map((r, i) => ({
    id: (idIdx>=0 ? r[idIdx] : "")?.trim() || `perennial:${i}`,
    common: (cnIdx>=0 ? r[cnIdx] : r[0])?.trim() || "Unnamed Perennial",
    sci: (snIdx>=0 ? r[snIdx] : "")?.trim(),
    care: (careIdx>=0 ? r[careIdx] : "")?.trim()
  })).filter(x => x.common);

  let activeSmart = new Set();

  mount.innerHTML = `
    <div class="hf-toolbar">
      <div class="search-wrap">
        <input id="hfPerennialSearch" type="search" placeholder="Search perennials…" autocomplete="off" />
      </div>

      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <label class="pill-toggle">
          <input type="radio" name="hfPerennialMode" value="both" checked />
          Both
        </label>
        <label class="pill-toggle">
          <input type="radio" name="hfPerennialMode" value="common" />
          Common
        </label>
        <label class="pill-toggle">
          <input type="radio" name="hfPerennialMode" value="scientific" />
          Scientific
        </label>
      </div>

      <div class="hf-count" id="hfPerennialCount">${items.length} items</div>
    </div>

    <div class="filter-bar" id="hfSmartFilters">
      ${HF_SMART_TAGS.map(t=>`<div class="filter-chip" data-filter="${t.id}">${t.label}</div>`).join("")}
    </div>

    <div id="hfPerennialGrid" class="card-grid"></div>
  `;

  const grid = document.getElementById("hfPerennialGrid");
  const count = document.getElementById("hfPerennialCount");
  const search = document.getElementById("hfPerennialSearch");

  const modeInputs = () =>
    [...document.querySelectorAll('input[name="hfPerennialMode"]')]
      .find(r => r.checked)?.value || "both";

  function openPerennialModal(it){
    const bodyHtml = `
      <div class="glass-panel" style="margin-bottom:10px;">
        <div style="font-weight:900;margin-bottom:6px;">Care</div>
        <div style="line-height:1.5;color:var(--text);">${esc(it.care || "—")}</div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:12px;">
        <button class="popup-close" onclick="window.print()">🖨 Print Care Card</button>
      </div>
    `;

    // If you later add a dedicated HF modal, this will still work via fallback
    ensureSimpleModal();
    document.getElementById("infoModalTitle").textContent = it.common;
    document.getElementById("infoModalSub").textContent = it.sci || "Perennial";
    document.getElementById("infoModalBody").innerHTML = bodyHtml;
    document.getElementById("infoModalBackdrop").style.display = "flex";
  }

  function renderList(){
    const query = (search.value || "").trim().toLowerCase();
    const mode = modeInputs();

    const filtered = items.filter(it=>{
      const common = (it.common || "").toLowerCase();
      const sci = (it.sci || "").toLowerCase();
      const care = (it.care || "");

      if(query){
        if(mode === "common" && !common.includes(query)) return false;
        if(mode === "scientific" && !sci.includes(query)) return false;
        if(mode === "both" && !common.includes(query) && !sci.includes(query)) return false;
      }

      for(const f of activeSmart){
        const tag = HF_SMART_TAGS.find(t=>t.id===f);
        if(tag && !tag.match.test(care)) return false;
      }

      return true;
    });

    count.textContent = `${filtered.length} item${filtered.length===1?"":"s"}`;

    grid.innerHTML = filtered.map(it=>{
      const preview = it.care ? (it.care.length > 90 ? it.care.slice(0,90).trim() + "…" : it.care) : "Tap for care details";
      return `
        <div class="card" data-perennial="${esc(it.id)}" role="button" tabindex="0">
          <div class="card-title">${esc(it.common)}</div>
          <div class="card-sub"><em>${esc(it.sci || "")}</em></div>
          <div class="card-sub">${esc(preview)}</div>
          <div class="filter-bar">
            <span class="filter-chip" style="cursor:default;">Perennial</span>
            <span class="filter-chip" style="cursor:default;">Midwest</span>
          </div>
        </div>
      `;
    }).join("") || `<div class="glass-panel">No matches.</div>`;

    grid.querySelectorAll("[data-perennial]").forEach(el=>{
      const id = el.getAttribute("data-perennial");
      const it = items.find(x => x.id === id);
      if(!it) return;

      el.addEventListener("click", ()=> openPerennialModal(it));
      el.addEventListener("keydown", (e)=>{
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          openPerennialModal(it);
        }
      });
    });
  }

  search.addEventListener("input", renderList);
  document.querySelectorAll('input[name="hfPerennialMode"]').forEach(r=>{
    r.addEventListener("change", ()=> renderList());
  });

  document.querySelectorAll("#hfSmartFilters .filter-chip").forEach(chip=>{
    chip.onclick = ()=>{
      const id = chip.dataset.filter;
      if(activeSmart.has(id)) activeSmart.delete(id);
      else activeSmart.add(id);
      chip.classList.toggle("active");
      renderList();
    };
  });

  renderList();
}

/* =========================================================
   PESTS.CSV shared renderer for HF + HPA (add-on)
   ========================================================= */
function openInfoModal({ title, sub, bodyHtml }){
  ensureSimpleModal();
  document.getElementById("infoModalTitle").textContent = title || "Details";
  document.getElementById("infoModalSub").textContent = sub || "";
  document.getElementById("infoModalBody").innerHTML = bodyHtml || "";
  document.getElementById("infoModalBackdrop").style.display = "flex";
}

async function renderPestsFromCsv(mountId){
  const mount = document.getElementById(mountId);
  if(!mount) return;

  const rows = await loadCsvSafe("pests.csv");
  if(!rows || rows.length < 2){
    mount.innerHTML = `<div class="glass-panel">No pest data available (missing pests.csv).</div>`;
    return;
  }

  const header = rows[0].map(h=>String(h).toLowerCase().trim());
  const idx = (name)=> header.indexOf(name);

  const idIdx   = idx("id");
  const nameIdx = idx("name");
  const signsIdx = idx("signs");
  const condIdx  = idx("conditions");
  const treatIdx = idx("treatment");
  const tagsIdx  = idx("tags");

  const pests = rows.slice(1).map((r,i)=>({
    id: (idIdx>=0 ? r[idIdx] : "")?.trim() || `pest:${i}`,
    name: (nameIdx>=0 ? r[nameIdx] : r[0])?.trim() || "Unnamed pest",
    signs: (signsIdx>=0 ? r[signsIdx] : "")?.trim(),
    conditions: (condIdx>=0 ? r[condIdx] : "")?.trim(),
    treatment: (treatIdx>=0 ? r[treatIdx] : "")?.trim(),
    tags: (tagsIdx>=0 ? r[tagsIdx] : "")?.trim()
  })).filter(p=>p.name);

  mount.innerHTML = `
    <div class="hf-toolbar">
      <div class="search-wrap">
        <input id="${mountId}-pestSearch" type="search" placeholder="Search pests…" autocomplete="off" />
      </div>
      <div class="hf-count" id="${mountId}-pestCount">${pests.length} pests</div>
    </div>
    <div class="card-grid" id="${mountId}-pestGrid"></div>
  `;

  const grid = document.getElementById(`${mountId}-pestGrid`);
  const count = document.getElementById(`${mountId}-pestCount`);
  const search = document.getElementById(`${mountId}-pestSearch`);

  function render(){
    const q = (search.value||"").trim().toLowerCase();
    const filtered = !q ? pests : pests.filter(p=>{
      const hay = `${p.name} ${p.signs} ${p.tags}`.toLowerCase();
      return hay.includes(q);
    });

    count.textContent = `${filtered.length} pest${filtered.length===1?"":"s"}`;

    grid.innerHTML = filtered.map(p=>{
      const preview = p.signs ? (p.signs.length > 80 ? p.signs.slice(0,80).trim()+"…" : p.signs) : "Tap for identification + treatment";
      const tagList = p.tags ? p.tags.split(",").map(t=>t.trim()).filter(Boolean) : [];
      return `
        <div class="card" data-pest="${esc(p.id)}" role="button" tabindex="0">
          <div class="card-title">${esc(p.name)}</div>
          <div class="card-sub">${esc(preview)}</div>
          <div class="filter-bar">
            <span class="filter-chip" style="cursor:default;">Pest</span>
            ${tagList.slice(0,3).map(t=>`<span class="filter-chip" style="cursor:default;">${esc(t)}</span>`).join("")}
          </div>
        </div>
      `;
    }).join("") || `<div class="glass-panel">No matches.</div>`;

    grid.querySelectorAll("[data-pest]").forEach(el=>{
      const id = el.getAttribute("data-pest");
      const p = pests.find(x=>x.id === id);
      if(!p) return;

      const open = ()=>{
        openInfoModal({
          title: p.name,
          sub: p.tags ? `Tags: ${p.tags}` : "Pest",
          bodyHtml: `
            <div class="glass-panel" style="margin-bottom:10px;">
              <div style="font-weight:850;margin-bottom:6px;">Signs</div>
              <div style="line-height:1.45;">${esc(p.signs || "—")}</div>
            </div>
            <div class="glass-panel" style="margin-bottom:10px;">
              <div style="font-weight:850;margin-bottom:6px;">Conditions</div>
              <div style="line-height:1.45;">${esc(p.conditions || "—")}</div>
            </div>
            <div class="glass-panel">
              <div style="font-weight:850;margin-bottom:6px;">Treatment</div>
              <div style="line-height:1.45;">${esc(p.treatment || "—")}</div>
            </div>
            <div style="display:flex;justify-content:flex-end;margin-top:12px;">
              <button class="popup-close" onclick="window.print()">🖨 Print Pest Card</button>
            </div>
          `
        });
      };

      el.addEventListener("click", open);
      el.addEventListener("keydown", (e)=>{
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          open();
        }
      });
    });
  }

  search.addEventListener("input", render);
  render();
}
