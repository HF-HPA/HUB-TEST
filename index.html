<style>
    /* ========= CORE THEME ========= */
    :root {
      --bg: #020617;
      --bg-alt: #030a1a;
      --card-bg: rgba(15, 23, 42, 0.85);
      --card-glass: rgba(15, 23, 42, 0.75);
      --text: #e5e7eb;
      --heading: #f9fafb;
      --muted: #9ca3af;
      --border-subtle: rgba(148, 163, 184, 0.45);
      --border-soft: rgba(148, 163, 184, 0.25);
      --radius-lg: 14px;
      --radius-md: 10px;
      --radius-pill: 999px;
      --shadow-soft: 0 16px 40px rgba(0, 0, 0, 0.55);
      --transition-fast: 0.18s ease-out;
      --accent: #22d3ee;
      --accent-soft: rgba(34, 211, 238, 0.15);
      --accent-strong: #06b6d4;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)),
        url("philo.jpg") no-repeat center center fixed;
      background-size: cover;
      backdrop-filter: blur(6px);
      color: var(--text);
      min-height: 100vh;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 30% 20%, rgba(34, 211, 238, 0.12), transparent 60%),
        radial-gradient(circle at 80% 70%, rgba(34, 211, 238, 0.1), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        circle at center,
        rgba(0, 0, 0, 0) 40%,
        rgba(0, 0, 0, 0.35) 100%
      );
      z-index: 0;
    }
    .app-shell {
      width: 100%;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }
    .app-inner {
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px 20px 14px;
      margin: 0 auto;
      background: linear-gradient(
        135deg,
        rgba(15, 23, 42, 0.98),
        rgba(15, 23, 42, 0.9)
      );
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(148, 163, 184, 0.35);
      backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
    }
    .hidden { display: none !important; }
    button { font-family: inherit; }

    .footer {
      margin-top: 10px;
      font-size: 0.75rem;
      color: #6b7280;
      text-align: right;
      border-top: 1px solid rgba(15, 23, 42, 0.95);
      padding-top: 6px;
    }

    /* ========= SPLASH + LOGO UNDERGLOW ========= */
    .splash-root {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }
    .splash-logo-wrapper {
      position: relative;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      outline: none;
    }
    .splash-logo-img {
      width: 240px;
      height: auto;
      display: block;
      filter:
        drop-shadow(0 25px 50px rgba(0, 0, 0, 0.9))
        drop-shadow(0 0 35px rgba(34, 211, 238, 0.6));
      transition:
        transform 0.32s ease-out,
        filter 0.32s ease-out;
      position: relative;
      z-index: 2;
    }
    .splash-logo-wrapper:hover .splash-logo-img,
    .splash-logo-wrapper:focus-visible .splash-logo-img {
      transform: translateY(-3px) scale(1.03);
      filter:
        drop-shadow(0 28px 55px rgba(0, 0, 0, 0.95))
        drop-shadow(0 0 40px rgba(34, 211, 238, 0.9));
    }
    .splash-logo-wrapper::before,
    .splash-logo-wrapper::after {
      content: "";
      position: absolute;
      bottom: -18px;
      width: 260px;
      height: 80px;
      border-radius: 50%;
      transform-origin: center;
      pointer-events: none;
      filter: blur(20px);
      z-index: 1;
    }
    .splash-logo-wrapper::before {
      background:
        radial-gradient(circle at 50% 0%, rgba(56,189,248,0.65), transparent 60%),
        radial-gradient(circle at 30% 20%, rgba(34,211,238,0.9), transparent 55%);
      opacity: 0.8;
      animation: pulseUnderglow 2.4s ease-in-out infinite;
    }
    .splash-logo-wrapper::after {
      background:
        radial-gradient(circle at 70% 20%, rgba(59,130,246,0.9), transparent 60%),
        radial-gradient(circle at 50% 0%, rgba(8,47,73,0.9), transparent 70%);
      opacity: 0.5;
      animation: pulseUnderglowAlt 3.1s ease-in-out infinite;
    }
    @keyframes pulseUnderglow {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.7; }
      50% { transform: translateY(-4px) scale(1.08); opacity: 1; }
    }
    @keyframes pulseUnderglowAlt {
      0%, 100% { transform: translateY(0) scale(0.95); opacity: 0.5; }
      50% { transform: translateY(-2px) scale(1.05); opacity: 0.85; }
    }
    .splash-subtitle {
      text-align: center;
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .splash-helper {
      margin-top: 4px;
      font-size: 0.8rem;
      color: #94a3b8;
      text-align: center;
    }

    /* Fade transitions */
    .splash-fade-out {
      animation: splashFadeOut 0.7s ease-out forwards;
    }
    .login-fade-in {
      animation: loginFadeIn 0.7s ease-in forwards;
    }
    @keyframes splashFadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes loginFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    .logo-tap .splash-logo-img {
      animation: logoPulse 0.4s ease-out;
    }
    @keyframes logoPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* ========= LOGIN ========= */
    .login-root {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: radial-gradient(circle at top left, rgba(34, 211, 238, 0.18), rgba(15, 23, 42, 0.98));
      border-radius: 22px;
      border: 1px solid var(--border-subtle);
      padding: 22px 20px 18px;
      box-shadow: 0 22px 55px rgba(0, 0, 0, 0.96);
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    .login-logo-small {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.8);
      object-fit: cover;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.9);
    }
    .login-title {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--heading);
      margin-top: 6px;
    }
    .login-subtitle {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
      width: 100%;
    }
    .form-label {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .form-input,
    .form-select {
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      background: rgba(2, 6, 23, 0.97);
      color: var(--text);
      padding: 8px 11px;
      font-size: 0.9rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.7);
      width: 100%;
    }
    .form-input::placeholder {
      color: #6b7280;
    }
    .primary-button {
      margin-top: 8px;
      width: 100%;
      background: radial-gradient(circle at top left, var(--accent-strong), #3b82f6);
      color: #020617;
      border: none;
      border-radius: var(--radius-pill);
      padding: 10px 18px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 14px 36px rgba(37, 99, 235, 0.82);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition:
        transform 0.15s ease-out,
        box-shadow 0.15s ease-out,
        filter 0.15s ease-out;
    }
    .primary-button:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
      box-shadow: 0 18px 42px rgba(59, 130, 246, 0.96);
    }
    .login-error {
      margin-top: 4px;
      font-size: 0.8rem;
      color: #fecaca;
      text-align: center;
      min-height: 1.1em;
    }

    /* ========= HUB ========= */
    .hub-root {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .hub-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .hub-title-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .hub-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--heading);
    }
    .hub-subtitle {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .hub-user-pill {
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(148, 163, 184, 0.45);
      font-size: 0.8rem;
      color: var(--muted);
      background: radial-gradient(circle at top left, rgba(34, 211, 238, 0.08), transparent 55%);
    }
    .hub-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 4px;
    }
    @media (min-width: 800px) {
      .hub-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
    .hub-card {
      position: relative;
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.55);
      background:
        radial-gradient(circle at top left, rgba(34, 211, 238, 0.24), rgba(15, 23, 42, 0.97));
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.9);
      padding: 18px 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      transition:
        transform 0.18s ease-out,
        border-color 0.18s ease-out,
        box-shadow 0.18s ease-out,
        background 0.18s ease-out;
    }
    .hub-card::after {
      content: "";
      position: absolute;
      inset: 40% -30% auto auto;
      height: 120px;
      background: radial-gradient(circle at top, rgba(56, 189, 248, 0.4), transparent 65%);
      opacity: 0;
      transition: opacity 0.2s ease-out;
      pointer-events: none;
    }
    .hub-card:hover {
      transform: translateY(-4px) scale(1.01);
      border-color: var(--accent);
      box-shadow: 0 24px 56px rgba(0, 0, 0, 0.94);
    }
    .hub-card:hover::after {
      opacity: 1;
    }
    .hub-card-label {
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #bae6fd;
      margin-bottom: 4px;
    }
    .hub-card-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--heading);
    }
    .hub-card-subtitle {
      margin-top: 4px;
      font-size: 0.9rem;
      color: #e5e7eb;
    }
    .hub-card-tagline {
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ========= MODULES ========= */
    .module-root {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .module-back-btn {
      align-self: flex-start;
      margin-bottom: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-soft);
      background: rgba(15, 23, 42, 0.85);
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition:
        background var(--transition-fast),
        color var(--transition-fast),
        border-color var(--transition-fast);
    }
    .module-back-btn:hover {
      background: rgba(15, 23, 42, 1);
      color: var(--heading);
      border-color: rgba(148, 163, 184, 0.7);
    }
    .module-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
    }
    .module-logo {
      width: 80px;
      height: 80px;
      border-radius: 22px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.9);
      object-fit: cover;
      background: rgba(15, 23, 42, 0.96);
    }
    .module-title {
      margin-top: 6px;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--heading);
    }
    .module-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
    }
    .module-tabs {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(15, 23, 42, 0.95);
      margin-top: 6px;
    }
    .module-tab {
      padding: 7px 14px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      transition:
        color var(--transition-fast),
        background var(--transition-fast),
        border-color var(--transition-fast),
        box-shadow var(--transition-fast),
        transform var(--transition-fast);
    }
    .module-tab:hover {
      color: var(--heading);
      background: rgba(15, 23, 42, 0.98);
      border-color: rgba(148, 163, 184, 0.5);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.6);
      transform: translateY(-1px);
    }
    .module-tab.active {
      color: var(--heading);
      background: radial-gradient(circle at top left, rgba(34, 211, 238, 0.32), rgba(15, 23, 42, 0.98));
      border-color: rgba(34, 211, 238, 0.8);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.9);
    }
    .module-content { margin-top: 10px; }

    .section-header {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }
    .section-title {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--heading);
    }
    .section-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .glass-panel {
      background: var(--card-glass);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(16px);
      padding: 14px;
      font-size: 0.9rem;
      color: var(--text);
    }

    /* ========= HPA INNER TABS ========= */
    .section-inner-tabs {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 6px;
      background: rgba(15, 23, 42, 0.85);
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.5);
      margin-bottom: 10px;
    }
    .section-inner-tab {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      transition:
        background var(--transition-fast),
        color var(--transition-fast),
        border-color var(--transition-fast),
        transform var(--transition-fast);
    }
    .section-inner-tab:hover {
      color: var(--heading);
      background: rgba(15, 23, 42, 0.9);
      border-color: rgba(148, 163, 184, 0.4);
      transform: translateY(-1px);
    }
    .section-inner-tab.active {
      color: var(--heading);
      background: radial-gradient(circle at top left, rgba(34, 211, 238, 0.24), rgba(15, 23, 42, 0.98));
      border-color: rgba(34, 211, 238, 0.8);
    }
    .section-inner-content { margin-top: 10px; }

    .inner-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .inner-tab {
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      transition:
        background var(--transition-fast),
        color var(--transition-fast),
        border-color var(--transition-fast),
        transform var(--transition-fast);
    }
    .inner-tab:hover {
      color: var(--heading);
      background: rgba(15, 23, 42, 0.98);
      border-color: rgba(148, 163, 184, 0.5);
      transform: translateY(-1px);
    }
    .inner-tab.active {
      background: radial-gradient(circle at top left, rgba(34, 211, 238, 0.25), rgba(15, 23, 42, 0.98));
      border-color: rgba(34, 211, 238, 0.9);
      color: var(--heading);
    }
    .inner-content { margin-top: 6px; }

    /* ========= PRODUCT / CARE / POPUP styles ========= */
    .controls {
      background: var(--card-glass);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(16px);
    }
    @media (min-width: 900px) {
      .controls { flex-direction: row; align-items: center; }
    }
    .search-wrapper { flex: 2; position: relative; }
    .search-input {
      width: 100%;
      padding: 10px 34px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-soft);
      background: rgba(2, 6, 23, 0.9);
      color: var(--text);
      font-size: 0.9rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.55);
    }
    .search-input::placeholder { color: #64748b; }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      pointer-events: none;
      font-size: 0.9rem;
    }
    .filters {
      flex: 3;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      min-width: 140px;
      gap: 3px;
    }
    .filter-label {
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .filter-input {
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-soft);
      background: rgba(2, 6, 23, 0.92);
      padding: 6px 10px;
      color: var(--text);
      font-size: 0.8rem;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }
    .results-header {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .results-header strong { color: var(--heading); }
    .sku-grid {
      display: grid;
      gap: 12px;
      margin-top: 10px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 600px) {
      .sku-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1000px) {
      .sku-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .sku-card {
      position: relative;
      background: var(--card-glass);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(148, 163, 184, 0.5);
      padding: 14px;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
      transition:
        transform 0.18s ease-out,
        border-color 0.18s ease-out,
        box-shadow 0.18s ease-out,
        background 0.18s ease-out;
    }
    .sku-card:hover {
      transform: translateY(-3px) scale(1.01);
      border-color: var(--accent);
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.8);
      background: radial-gradient(circle at top left, rgba(34, 211, 238, 0.25), rgba(15, 23, 42, 0.98));
    }
    .sku-year-pill {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(15, 23, 42, 0.98);
      border-radius: var(--radius-pill);
      border: 1px solid rgba(148, 163, 184, 0.8);
      padding: 3px 8px;
      font-size: 0.7rem;
      color: #e2e8f0;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.7);
    }
    .sku-name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: #e5f0ff;
    }
    .sku-meta {
      font-size: 0.8rem;
      color: #cbd5e1;
      line-height: 1.4;
    }
    .empty-state {
      padding: 20px;
      margin-top: 16px;
      text-align: center;
      color: var(--muted);
      background: rgba(15, 23, 42, 0.75);
      border-radius: var(--radius-lg);
      border: 1px dashed var(--border-subtle);
    }

    .order-table-wrapper {
      background: var(--card-glass);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 18px;
      box-shadow: var(--shadow-soft);
      margin-top: 10px;
      backdrop-filter: blur(16px);
    }
    .order-table-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--heading);
    }
    .order-table {
      width: 100%;
      border-collapse: collapse;

  <!-- ================= FIREBASE (MODULE) ================= -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      doc,
      setDoc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      // 🔴 PASTE YOUR CONFIG HERE
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.fb = { collection, doc, setDoc, onSnapshot };
  </script>

  <!-- ================= APP LOGIC ================= -->
  <script>
    /* ========= BASIC VIEW SWITCHING ========= */
    const views = ["view-splash","view-login","view-hub","view-map"];
    const show = id => views.forEach(v =>
      document.getElementById(v)?.classList.toggle("hidden", v !== id)
    );

    /* ========= SPLASH ========= */
    splashEnter.onclick = () => {
      splashEnter.classList.add("logo-tap");
      setTimeout(() => {
        show("view-login");
      }, 350);
    };

    /* ========= LOGIN ========= */
    async function loadUsers(){
      const res = await fetch("users.csv");
      const txt = await res.text();
      const lines = txt.split(/\r?\n/).filter(Boolean);
      const h = lines.shift().split(",");
      return lines.map(l => {
        const r = l.split(",");
        return {
          username:r[h.indexOf("username")],
          password:r[h.indexOf("password")],
          role:r[h.indexOf("role")],
          name:r[h.indexOf("displayName")]
        };
      });
    }

    loginBtn.onclick = async () => {
      loginError.textContent = "";
      const users = await loadUsers();
      const u = users.find(x =>
        x.username === loginUser.value &&
        x.password === loginPass.value
      );
      if(!u){
        loginError.textContent = "Invalid login";
        return;
      }
      window.CURRENT_USER = u;
      userPill.textContent = `${u.name} • ${u.role}`;
      show("view-hub");
    };

    /* ========= HUB ========= */
    document.querySelectorAll("[data-open]").forEach(card =>
      card.onclick = () => {
        show(card.dataset.open);
        if(card.dataset.open === "view-map") MapDash.ensureInit();
      }
    );
 /***********************
     * MAP DASH (fixed + live sync + fallback)
     ***********************/
    const MapDash = (() => {
      const STORES_CSV_URL = "stores.csv";
      const STORE_STATE_KEY = "hub_store_state_v2";
      const BC = ("BroadcastChannel" in window) ? new BroadcastChannel("hub_store_state") : null;

      const DEFAULT_STORE_STATE = () => ({
        pictures: false,
        markdowns: false,
        negatives: false,
        issues: [],
        shippingGrade: "",
        updatedAt: null
      });

      let stores = [];
      let state = {};
      let selectedId = null;

      let map = null;
      let markers = new Map();
      let activeFilter = "all";
      let initialized = false;

      // Live Firestore
      let liveEnabled = false;
      let unsubscribeLive = null;

      const demoStores = [
        { id: "1950", name: "South Loop", lat: 41.8561, lon: -87.6244, city: "Chicago", state: "IL", address: "" },
        { id: "1987", name: "Glenview", lat: 42.0792, lon: -87.8223, city: "Glenview", state: "IL", address: "" },
        { id: "6919", name: "Frankfort", lat: 41.4969, lon: -87.8340, city: "Frankfort", state: "IL", address: "" }
      ];

      function el(id){ return document.getElementById(id); }
      function safeText(node, txt){ if(node) node.textContent = txt; }

      function setPanelButtonsEnabled(enabled){
        document.querySelectorAll('#view-map [data-map-action]').forEach(b => b.disabled = !enabled);
      }

      function loadLocal(){
        try{
          const raw = localStorage.getItem(STORE_STATE_KEY);
          if(raw){
            const parsed = JSON.parse(raw);
            if(parsed && typeof parsed === "object") state = parsed;
          }
        }catch(e){}
      }

      function saveLocal(){
        try{ localStorage.setItem(STORE_STATE_KEY, JSON.stringify(state)); }catch(e){}
        try{ BC && BC.postMessage({ type:"state", state }); }catch(e){}
      }

      function parseStoresCsv(text){
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        if(!lines.length) return [];
        const header = parseCsvLine(lines[0]).map(h => h.toLowerCase().trim());
        const idx = {
          id: header.indexOf("store_id"),
          name: header.indexOf("store_name"),
          lat: header.indexOf("lat"),
          lon: header.indexOf("lon"),
          city: header.indexOf("city"),
          state: header.indexOf("state"),
          address: header.indexOf("address"),
        };
        const out = [];
        for(let i=1;i<lines.length;i++){
          const row = parseCsvLine(lines[i]);
          const id = (row[idx.id] || "").trim();
          const name = (row[idx.name] || "").trim();
          const lat = parseFloat((row[idx.lat] || "").trim());
          const lon = parseFloat((row[idx.lon] || "").trim());
          if(!id || !name || Number.isNaN(lat) || Number.isNaN(lon)) continue;
          out.push({
            id, name, lat, lon,
            city: idx.city >= 0 ? (row[idx.city] || "").trim() : "",
            state: idx.state >= 0 ? (row[idx.state] || "").trim() : "",
            address: idx.address >= 0 ? (row[idx.address] || "").trim() : "",
          });
        }
        return out;
      }

      async function loadStores(){
        try{
          const res = await fetch(STORES_CSV_URL, { cache:"no-store" });
          if(!res.ok) throw new Error("stores.csv missing");
          const txt = await res.text();
          const parsed = parseStoresCsv(txt);
          stores = parsed.length ? parsed : demoStores;
        }catch(e){
          console.warn("[map] using demo stores because:", e);
          stores = demoStores;
        }
      }

      function ensureDefaults(){
        stores.forEach(s => {
          if(!state[s.id]) state[s.id] = DEFAULT_STORE_STATE();
          if(!Array.isArray(state[s.id].issues)) state[s.id].issues = [];
        });
        if(!liveEnabled) saveLocal();
      }

      function normalizeShip(raw){
        const s = (raw || "").toString().trim().toUpperCase();
        if(!s) return { key:"unknown", label:"—" };
        if(s.includes("SKIP")) return { key:"skip", label:raw };
        if(s.includes("A/B") || s === "A/B") return { key:"ab", label:raw };
        if(s.includes("ALL")) return { key:"all", label:raw };
        if(["A","B","C","D"].includes(s)) return { key:"ab", label:raw };
        return { key:"limited", label:raw };
      }

      function computeStatus(st){
        if(!st) return "unknown";
        const pics = !!st.pictures;
        const mds  = !!st.markdowns;
        const neg  = !!st.negatives;
        const issues = Array.isArray(st.issues) ? st.issues.length : 0;
        const missing = [pics, mds, neg].filter(v => !v).length;

        if(issues > 0) return missing >= 2 ? "bad" : "warn";
        if(missing === 0) return "ok";
        if(missing === 1) return "warn";
        return "bad";
      }

      function pinHtml(storeId){
        const st = state[storeId] || DEFAULT_STORE_STATE();
        const status = computeStatus(st);
        const ship = normalizeShip(st.shippingGrade);

        const stClass =
          status === "ok" ? "pin-ok" :
          status === "warn" ? "pin-warn" :
          status === "bad" ? "pin-bad" : "pin-unknown";

        const shipClass =
          ship.key === "all" ? "ship-all" :
          ship.key === "ab" ? "ship-ab" :
          ship.key === "limited" ? "ship-limited" :
          ship.key === "skip" ? "ship-skip" : "ship-unknown";

        return `<div class="pin ${stClass} ${shipClass}"></div>`;
      }

      function rerenderMarker(storeId){
        const marker = markers.get(storeId);
        if(!marker) return;
        const icon = L.divIcon({ className:"", html: pinHtml(storeId), iconSize:[18,18], iconAnchor:[9,9] });
        marker.setIcon(icon);
      }

      function rerenderAll(){
        stores.forEach(s => rerenderMarker(s.id));
        renderStoreDropdown();
        applyFilter(activeFilter);
      }

      function initMap(){
        const mapEl = el("storeMap");
        if(!mapEl) return;

        if(!map){
          map = L.map("storeMap", { zoomControl:true, preferCanvas:true });
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom:19,
            attribution:"© OpenStreetMap"
          }).addTo(map);
        }

        markers.forEach(m => { try{ map.removeLayer(m); }catch(e){} });
        markers.clear();

        const bounds = [];
        stores.forEach(store => {
          const icon = L.divIcon({ className:"", html: pinHtml(store.id), iconSize:[18,18], iconAnchor:[9,9] });
          const m = L.marker([store.lat, store.lon], { icon }).addTo(map);
          m.on("click", () => selectStore(store.id));
          markers.set(store.id, m);
          bounds.push([store.lat, store.lon]);
        });

        if(bounds.length) map.fitBounds(bounds, { padding:[20,20] });
        setTimeout(() => { try{ map.invalidateSize(); }catch(e){} }, 60);
      }

      function setBadge(label, color){
        const badge = el("spStatusBadge");
        if(!badge) return;
        badge.innerHTML = `<span class="badge-dot" style="background:${color}"></span><span>${label}</span>`;
      }

      function selectStore(storeId){
        selectedId = storeId;
        const store = stores.find(s => s.id === storeId);
        const st = state[storeId] || DEFAULT_STORE_STATE();
        const status = computeStatus(st);
        const ship = normalizeShip(st.shippingGrade);

        safeText(el("spTitle"), store ? `${store.name} (${store.id})` : `Store ${storeId}`);
        safeText(el("spSub"), store
          ? `${[store.city, store.state].filter(Boolean).join(", ")}${store.address ? " • " + store.address : ""}`
          : "—"
        );

        const statusLabel =
          status === "ok" ? "🟢 On Track" :
          status === "warn" ? "🟡 Watch List" :
          status === "bad" ? "🔴 Needs Attention" : "⚪ Unknown";

        const statusColor =
          status === "ok" ? "#22c55e" :
          status === "warn" ? "#facc15" :
          status === "bad" ? "#ef4444" : "#94a3b8";

        setBadge(statusLabel, statusColor);

        safeText(el("spShip"), ship.label || "—");
        safeText(el("spPics"), st.pictures ? "✅ Complete" : "❌ Missing");
        safeText(el("spMds"),  st.markdowns ? "✅ Complete" : "❌ Missing");
        safeText(el("spNeg"),  st.negatives ? "✅ Complete" : "❌ Missing");

        const issues = Array.isArray(st.issues) ? st.issues : [];
        safeText(el("spIssues"), issues.length ? `⚠ ${issues.length} open` : "✅ None");
        safeText(el("spUpdated"), st.updatedAt ? new Date(st.updatedAt).toLocaleString() : "—");

        setPanelButtonsEnabled(true);
      }

      function closePanel(){
        selectedId = null;
        safeText(el("spTitle"), "Select a store");
        safeText(el("spSub"), "Click a pin to view the store snippet (includes Shipping Grade).");
        setBadge("—", "#94a3b8");
        safeText(el("spShip"), "—");
        safeText(el("spPics"), "—");
        safeText(el("spMds"), "—");
        safeText(el("spNeg"), "—");
        safeText(el("spIssues"), "—");
        safeText(el("spUpdated"), "—");
        setPanelButtonsEnabled(false);
      }

      async function saveServerState(storeId, nextState){
        const fb = window.fb;
        const db = window.db;
        if(!fb || !db) throw new Error("Firebase not ready");
        const { doc, setDoc } = fb;
        await setDoc(doc(db, "stores", storeId), nextState, { merge:true });
      }

      async function updateStore(storeId, patch){
        const cur = state[storeId] || DEFAULT_STORE_STATE();
        const next = { ...cur, ...patch, updatedAt: Date.now() };
        if(!Array.isArray(next.issues)) next.issues = [];
        state[storeId] = next;

        // optimistic UI
        rerenderMarker(storeId);
        if(selectedId === storeId) selectStore(storeId);

        if(liveEnabled){
          try{
            await saveServerState(storeId, next);
          }catch(e){
            console.error("[map] live save failed -> local mode", e);
            liveEnabled = false;
            safeText(el("syncPill"), "Sync: Local");
            saveLocal();
          }
        }else{
          saveLocal();
        }
      }

      function applyFilter(filter){
        activeFilter = filter || "all";
        stores.forEach(store => {
          const marker = markers.get(store.id);
          if(!marker || !map) return;

          const st = state[store.id] || DEFAULT_STORE_STATE();
          const status = computeStatus(st);
          const ship = normalizeShip(st.shippingGrade);
          const issues = Array.isArray(st.issues) ? st.issues.length : 0;

          let visible = true;
          if(activeFilter === "status:bad") visible = (status === "bad");
          else if(activeFilter === "status:warn") visible = (status === "warn");
          else if(activeFilter === "ship:skip") visible = (ship.key === "skip");
          else if(activeFilter === "ship:ab") visible = (ship.key === "ab");
          else if(activeFilter === "issues:true") visible = (issues > 0);

          if(visible){
            if(!map.hasLayer(marker)) marker.addTo(map);
          }else{
            if(map.hasLayer(marker)) map.removeLayer(marker);
          }
        });
      }

      function renderStoreDropdown(){
        const menu = el("storeListMenu");
        if(!menu) return;
        menu.innerHTML = "";

        const sorted = [...stores].sort((a,b) => (Number(a.id)||0) - (Number(b.id)||0));
        sorted.forEach(store => {
          const st = state[store.id] || DEFAULT_STORE_STATE();
          const status = computeStatus(st);
          const ship = normalizeShip(st.shippingGrade);
          const icon = status === "ok" ? "🟢" : status === "warn" ? "🟡" : status === "bad" ? "🔴" : "⚪";

          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "dd-item";
          btn.setAttribute("data-map-store", store.id);
          btn.innerHTML = `<span>${icon} ${store.id} – ${store.name}</span><span class="dd-sub">${ship.label || "—"}</span>`;
          menu.appendChild(btn);
        });
      }

      function setUserPill(){
        const pill = el("mapUserInfo");
        if(!pill || !CURRENT_USER) return;
        const name = CURRENT_USER.displayName || CURRENT_USER.username || "N/A";
        pill.textContent = `Role: ${CURRENT_USER.role} • User: ${name}`;
      }

      function closeAllDropdowns(){
        document.querySelectorAll('#view-map .dd').forEach(dd => dd.classList.remove('open'));
        document.querySelectorAll('#view-map [data-dd-toggle]').forEach(b => b.setAttribute('aria-expanded','false'));
      }

      function bindUI(){
        const root = el("view-map");
        if(!root || root._bound) return;

        root.addEventListener("click", (e) => {
          const t = e.target;

          // Dropdown toggle
          const toggleBtn = t.closest("[data-dd-toggle]");
          if(toggleBtn){
            e.stopPropagation();
            const dd = toggleBtn.closest(".dd");
            const isOpen = dd.classList.toggle("open");
            toggleBtn.setAttribute("aria-expanded", isOpen ? "true" : "false");
            root.querySelectorAll(".dd").forEach(other => { if(other !== dd) other.classList.remove("open"); });
            return;
          }

          // Filter
          const filterBtn = t.closest("[data-map-filter]");
          if(filterBtn){
            closeAllDropdowns();
            applyFilter(filterBtn.getAttribute("data-map-filter"));
            return;
          }

          // Store pick
          const storeBtn = t.closest("[data-map-store]");
          if(storeBtn){
            closeAllDropdowns();
            const id = storeBtn.getAttribute("data-map-store");
            selectStore(id);
            const marker = markers.get(id);
            if(marker && map) map.setView(marker.getLatLng(), Math.max(map.getZoom(), 11), { animate:true });
            return;
          }

          // Actions
          const actionBtn = t.closest("[data-map-action]");
          if(actionBtn){
            if(!selectedId) return;
            const action = actionBtn.getAttribute("data-map-action");
            const cur = state[selectedId] || DEFAULT_STORE_STATE();

            if(action === "toggle:pictures") updateStore(selectedId, { pictures: !cur.pictures });
            else if(action === "toggle:markdowns") updateStore(selectedId, { markdowns: !cur.markdowns });
            else if(action === "toggle:negatives") updateStore(selectedId, { negatives: !cur.negatives });
            else if(action === "add:issue"){
              const msg = window.prompt("Add an issue for this store:");
              if(!msg) return;
              const issues = Array.isArray(cur.issues) ? [...cur.issues] : [];
              issues.push(msg.trim());
              updateStore(selectedId, { issues });
            }else if(action === "zoom"){
              const marker = markers.get(selectedId);
              if(marker && map) map.setView(marker.getLatLng(), Math.max(map.getZoom(), 12), { animate:true });
            }else if(action === "close"){
              closePanel();
            }
            return;
          }
        });

        document.addEventListener("click", (e) => {
          const inMap = e.target.closest("#view-map");
          if(!inMap) return;
          const inDropdown = e.target.closest(".dd");
          if(!inDropdown) closeAllDropdowns();
        });

        // Cross-tab sync (local mode only)
        if(BC){
          BC.onmessage = (ev) => {
            if(ev.data && ev.data.type === "state" && ev.data.state && !liveEnabled){
              state = ev.data.state;
              ensureDefaults();
              rerenderAll();
              if(selectedId) selectStore(selectedId);
            }
          };
        }

        root._bound = true;
      }

      function startFirestoreLive(){
        const fb = window.fb;
        const db = window.db;
        if(!fb || !db) throw new Error("Firebase not ready");
        const { collection, onSnapshot } = fb;

        if(unsubscribeLive){
          try{ unsubscribeLive(); }catch(e){}
          unsubscribeLive = null;
        }

        unsubscribeLive = onSnapshot(
          collection(db, "stores"),
          (snapshot) => {
            const next = {};
            snapshot.forEach(docSnap => { next[docSnap.id] = docSnap.data(); });
            state = next;

            liveEnabled = true;
            safeText(el("syncPill"), "Sync: Live");
            ensureDefaults();
            rerenderAll();
            if(selectedId) selectStore(selectedId);
          },
          (err) => {
            console.error("[map] Firestore listener failed:", err);
            throw err;
          }
        );
      }

      async function waitForFirebaseReady(){
        // Quick inline wait (no background work)
        for(let i=0;i<30;i++){
          if(window.db && window.fb) return true;
          await new Promise(r => setTimeout(r, 50));
        }
        return false;
      }

      async function ensureInit(){
        if(initialized){
          setUserPill();
          setTimeout(() => { try{ map && map.invalidateSize(); }catch(e){} }, 80);
          return;
        }
        initialized = true;

        setUserPill();
        safeText(el("syncPill"), "Sync: Connecting…");

        await loadStores();
        bindUI();
        initMap();

        // local mode first
        loadLocal();
        liveEnabled = false;
        safeText(el("syncPill"), "Sync: Local");

        ensureDefaults();
        renderStoreDropdown();
        rerenderAll();
        closePanel();

        // try upgrade to Firestore live
        try{
          const ready = await waitForFirebaseReady();
          if(ready) startFirestoreLive();
        }catch(e){
          console.warn("[map] staying local (Firestore unavailable):", e);
          liveEnabled = false;
          safeText(el("syncPill"), "Sync: Local");
        }
      }

      return { ensureInit, applyFilter };
    })();

    /***********************
     * Global event wiring
     ***********************/
    function bindGlobal(){
      // Nav buttons
      document.querySelectorAll("[data-open]").forEach(btn => {
        btn.addEventListener("click", () => {
          const viewId = btn.getAttribute("data-open");
          const minRole = btn.getAttribute("data-min-role");
          if(!CURRENT_USER) return showView("view-login");
          if(minRole && !canAccess(CURRENT_USER.role, minRole)) return;
          showView(viewId);
        });
      });

      $("btnLogin").addEventListener("click", doLogin);
      $("password").addEventListener("keydown", (e) => { if(e.key === "Enter") doLogin(); });
      $("btnLogout").addEventListener("click", doLogout);
    }

    /***********************
     * Boot
     ***********************/
    (function boot(){
      bindGlobal();
      restoreAuth();
      setAuthPill();
      applyRoleGates();

      if(CURRENT_USER){
        showView("view-map");
      }else{
        showView("view-login");
      }
    })();
  </script>
</body>
</html>
