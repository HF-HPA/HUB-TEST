      --heading:#f9fafb;

      --accent2:#3b82f6;

      --warn:#facc15;
      --bad:#ef4444;

      gap:14px;

      box-shadow:0 0 40px rgba(34,211,238,.6);

    #storeMap{
      width:100%;
      height:60vh;
      min-height:500px;
      border-radius:var(--radius);
    }

</head>

<main class="app-shell">
  <div class="app-inner">

    <!-- ================= SPLASH ================= -->

  <script>
/* ======================================================
   BLOCK 3 — APP STATE, LOGIN, ROUTING
   ====================================================== */

/* ------------------ App State ------------------ */
const App = {
  user: null,
  view: "splash"
};

const views = [
  "splash",
  "login",
  "map",
  "hf",
  "hpa",
  "admin",
  "training"
];

/* ------------------ Helpers ------------------ */
const $ = (id) => document.getElementById(id);

function show(view){
  views.forEach(v=>{
    const el = $("view-" + v);
    if(el) el.classList.toggle("hidden", v !== view);
  });

  App.view = view;
}

function setActiveNav(view){
  document.querySelectorAll(".nav-link").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.view === view);
  });
}

/* ------------------ CSV Parser (REAL) ------------------ */
function parseCSV(text){
  const rows = [];
  let row = [], val = "", inQuotes = false;

  for(let i=0;i<text.length;i++){
    const c = text[i];
    const n = text[i+1];

    if(c === '"' && inQuotes && n === '"'){
      val += '"'; i++;
    } else if(c === '"'){
      inQuotes = !inQuotes;
    } else if(c === "," && !inQuotes){
      row.push(val); val="";
    } else if((c === "\n" || c === "\r") && !inQuotes){
      if(val || row.length){
        row.push(val);
        rows.push(row);
        row=[]; val="";
      }
    } else {
      val += c;
    }
  }
  if(val || row.length){
    row.push(val);
    rows.push(row);
  }
  return rows;
}

/* ------------------ Splash ------------------ */
$("view-splash").addEventListener("click", ()=>{
  show("login");
});

/* ------------------ Login ------------------ */
async function loadUsers(){
  try{
    const txt = await fetch("users.csv", { cache:"no-store" }).then(r=>r.text());
    const rows = parseCSV(txt);
    const header = rows[0].map(h=>h.toLowerCase());

    const uIdx = header.indexOf("username");
    const pIdx = header.indexOf("password");

    return rows.slice(1).map(r=>({
      username: (r[uIdx]||"").trim().toLowerCase(),
      password: (r[pIdx]||"").trim()
    })).filter(u=>u.username && u.password);
  }catch{
    // Safe fallback
    return [{ username:"demo", password:"demo" }];
  }
}

async function login(){
  const user = $("loginUser").value.trim().toLowerCase();
  const pass = $("loginPass").value.trim();
  const err = $("loginError");
  err.textContent = "";

  if(!user || !pass){
    err.textContent = "Enter username and password.";
    return;
  }

  const users = await loadUsers();
  const match = users.find(u=>u.username===user && u.password===pass);

  if(!match){
    err.textContent = "Invalid credentials.";
    return;
  }

  App.user = { username:user };
  sessionStorage.setItem("hub_user", JSON.stringify(App.user));

  $("topbar").classList.remove("hidden");
  $("globalUserPill")?.textContent = user;

  setActiveNav("map");
  show("map");
}

$("loginBtn").addEventListener("click", login);
$("loginPass").addEventListener("keydown", e=>{
  if(e.key === "Enter") login();
});

/* ------------------ Logout ------------------ */
$("logoutBtn").addEventListener("click", ()=>{
  App.user = null;
  sessionStorage.removeItem("hub_user");
  $("topbar").classList.add("hidden");
  show("splash");
});

/* ------------------ Navigation ------------------ */
document.querySelectorAll(".nav-link").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const view = btn.dataset.view;
    setActiveNav(view);
    show(view);
  });
});

/* ------------------ Session Restore ------------------ */
(function restore(){
  try{
    const raw = sessionStorage.getItem("hub_user");
    if(raw){
      App.user = JSON.parse(raw);
      $("topbar").classList.remove("hidden");
      setActiveNav("map");
      show("map");
      return;
    }
  }catch{}
  show("splash");
})();
</script>
  <script>
/* ======================================================
   BLOCK 4 — LEAFLET MAP (stable init) + stores.csv markers
   Depends on BLOCK 3: parseCSV(), show(), App, etc.
   ====================================================== */

/* ---------- Add missing UI styles used in BLOCK 2 (safe, additive) ---------- */
(function injectNiceUIStyles(){

    .bubble-title{ font-weight:900; letter-spacing:.10em; text-transform:uppercase; color:#f9fafb; margin-bottom:8px; font-size:.9rem; }
    .bubble-sub{ color:#9ca3af; font-size:.85rem; line-height:1.35; }

    .kv span:first-child{ color:#cbd5e1; }
    .kv span:last-child{ color:#f9fafb; font-weight:800; text-align:right; }
    .small-btn{ padding:8px 10px; border-radius:999px; border:1px solid rgba(148,163,184,.25); background: rgba(2,6,23,.75); color:#e5e7eb; cursor:pointer; font-weight:900; }
    .small-btn:disabled{ opacity:.55; cursor:not-allowed; }
    /* marker */
    .pin{ width:18px;height:18px;border-radius:999px;border:2px solid rgba(255,255,255,.85); box-shadow:0 6px 18px rgba(0,0,0,.7); background:#ef4444; }
  `;
  document.head.appendChild(st);
})();

/* ---------- Map module ---------- */
const MapModule = (() => {
  let map = null;
  let markers = new Map();
  let stores = [];
  let initialized = false;

  function isVisible(el){
    return el && !el.classList.contains("hidden");
  }

  function waitForLeafletReady(cb){
    const tryNow = () => {
      if (window.L && typeof window.L.map === "function") cb();
      else setTimeout(tryNow, 50);
    };
    tryNow();
  }

  function ensurePickerUI(){
    // Insert a store picker above the map container (BLOCK 2 didn't include it)
    const mapView = document.getElementById("view-map");
    if (!mapView) return;
    if (document.getElementById("storePickerBox")) return;

    const header = document.createElement("div");
    header.id = "storePickerBox";
    header.className = "bubble-soft";
    header.innerHTML = `
      <div class="bubble-title">Store Picker</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
        <input id="storeSearch" placeholder="Search store name or #…" style="flex:1;min-width:220px;padding:10px;border-radius:999px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.85);color:#e5e7eb;" />
        <select id="storeSelect" style="flex:1;min-width:220px;padding:10px;border-radius:999px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.85);color:#e5e7eb;"></select>
        <button id="storeFocusBtn" class="btn primary" type="button">Focus</button>
      </div>
      <div class="bubble-sub" style="margin-top:8px;">
        Tip: Click a pin or use the dropdown to jump to a store.
      </div>
    `;

    // place at top of map view
    mapView.insertBefore(header, mapView.firstChild);
  }

  async function loadStores(){
    try{
      const txt = await fetch("stores.csv", { cache:"no-store" }).then(r=>{
        if(!r.ok) throw new Error("stores.csv missing");
        return r.text();
      });
      const rows = parseCSV(txt);
      const header = rows[0].map(h => h.toLowerCase().trim());

      const idIdx   = header.indexOf("store_id");
      const nameIdx = header.indexOf("store_name");
      const latIdx  = header.indexOf("lat");
      const lonIdx  = header.indexOf("lon");
      const cityIdx = header.indexOf("city");
      const stIdx   = header.indexOf("state");

      stores = rows.slice(1).map(r=>({
        id: (r[idIdx]||"").trim(),
        name: (r[nameIdx]||"").trim(),
        lat: parseFloat((r[latIdx]||"").trim()),
        lon: parseFloat((r[lonIdx]||"").trim()),
        city: (r[cityIdx]||"").trim(),
        state: (r[stIdx]||"").trim()
      })).filter(s => s.id && s.name && !Number.isNaN(s.lat) && !Number.isNaN(s.lon));
    }catch(e){
      console.warn("[map] using demo stores:", e);
      stores = [
        { id:"1950", name:"South Loop", lat:41.856, lon:-87.624, city:"Chicago", state:"IL" },
        { id:"1987", name:"Glenview", lat:42.079, lon:-87.822, city:"Glenview", state:"IL" }
      ];
    }

    window.AppStores = stores;
  }

  function buildSelectOptions(){
    const sel = document.getElementById("storeSelect");
    if(!sel) return;

    const sorted = [...stores].sort((a,b) => (Number(a.id)||0) - (Number(b.id)||0));
    sel.innerHTML = sorted.map(s => `<option value="${s.id}">${s.id} — ${s.name}</option>`).join("");

    const search = document.getElementById("storeSearch");
    if(search){
      search.oninput = () => {
        const q = search.value.toLowerCase().trim();
        const match = sorted.find(s => (s.id+" "+s.name).toLowerCase().includes(q));
        if(match) sel.value = match.id;
      };
    }

    document.getElementById("storeFocusBtn").onclick = () => {
      const id = sel.value;
      const s = stores.find(x=>x.id===id);
      if(s) focusStore(s);
    };
  }

  function initLeaflet(){
    if(map) return;

    const mapEl = document.getElementById("storeMap");
    if(!mapEl) return;

    map = L.map(mapEl, { zoomControl:true, preferCanvas:true });
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom:19 }).addTo(map);
  }

  function clearMarkers(){
    markers.forEach(m => map.removeLayer(m));
    markers.clear();
  }

  function renderMarkers(){
    clearMarkers();
    const bounds = [];

    stores.forEach(s=>{
      const icon = L.divIcon({
        className:"",
        html:`<div class="pin"></div>`,
        iconSize:[18,18],
        iconAnchor:[9,9]
      });

      const m = L.marker([s.lat, s.lon], { icon }).addTo(map);
      m.on("click", () => selectStore(s));
      markers.set(s.id, m);
      bounds.push([s.lat,s.lon]);
    });

    if(bounds.length) map.fitBounds(bounds, { padding:[24,24] });
  }

  function focusStore(store){
    const m = markers.get(store.id);
    if(m) map.setView(m.getLatLng(), 12, { animate:true });
    selectStore(store);
  }

  function selectStore(store){
    // Update panel fields
    document.getElementById("spTitle").textContent = `${store.name} (${store.id})`;
    document.getElementById("spSub").textContent = [store.city, store.state].filter(Boolean).join(", ") || "—";

    // placeholders (Block 5 will wire real values)
    document.getElementById("spWatered").textContent = "—";
    document.getElementById("spNegatives").textContent = "—";
    document.getElementById("spIssues").textContent = "—";

    // enable issue button later, but enable now to show UI responsiveness
    const addIssue = document.getElementById("btnAddIssue");
    if(addIssue) addIssue.disabled = false;

    // expose selection globally for checklist/issue system in Block 5
    window.SelectedStore = store;
  }

  function invalidate(){
    if(!map) return;
    setTimeout(()=> map.invalidateSize(), 80);
  }

  async function ensureInit(){
    if(initialized) return;
    initialized = true;

    ensurePickerUI();

    await loadStores();

    waitForLeafletReady(() => {
      initLeaflet();
      renderMarkers();
      buildSelectOptions();
      invalidate();
    });
  }

  /* Observe visibility of view-map so we only init when map is visible */
  function observeMapView(){
    const mapView = document.getElementById("view-map");
    if(!mapView) return;

    const obs = new MutationObserver(() => {
      if(isVisible(mapView)) {
        ensureInit();
        invalidate();
      }
    });

    obs.observe(mapView, { attributes:true, attributeFilter:["class"] });
  }

  return { ensureInit, observeMapView, invalidate };
})();

/* Start observing map view visibility right away */
MapModule.observeMapView();

/* If user lands on map via session restore, init immediately */
if(!document.getElementById("view-map")?.classList.contains("hidden")){
  MapModule.ensureInit();
}
</script>

/* ------------------ Data + persistence ------------------ */
const STORE_STATE_KEY = "hub_store_state_v9";
const todayKey = () => new Date().toISOString().slice(0,10);
const uuid = () => (crypto?.randomUUID?.()) || (String(Date.now()) + Math.random().toString(16).slice(2));

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_STATE_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch{ return {}; }
}
function saveState(){
  try{ localStorage.setItem(STORE_STATE_KEY, JSON.stringify(StoreState)); }catch{}
}

const StoreState = loadState();

/* Default per store */
function defaultStoreState(){
  return {
    watered: false,
    wateredOn: null,      // YYYY-MM-DD
    negatives: false,
    pictures: false,
    checklist: {},        // dynamic item_id: bool
    issues: [],           // {id,text,createdAt,createdBy,resolved}
    updatedAt: null
  };
}

function ensureStore(id){
  if(!StoreState[id]) StoreState[id] = defaultStoreState();
  const st = StoreState[id];
  if(!st.checklist || typeof st.checklist !== "object") st.checklist = {};
  if(!Array.isArray(st.issues)) st.issues = [];

  // daily reset for watered
  if(st.wateredOn !== todayKey()){
    st.watered = false;
  }
  return st;
}

/* ------------------ Checklist schema (CSV) ------------------ */
/* checklist_items.csv format:
   item_id,label,active
*/
const ChecklistSchema = {
  loaded: false,
  items: [],
  async load(){
    if(this.loaded) return this.items;
    try{
      const txt = await fetch("checklist_items.csv", { cache:"no-store" }).then(r=>{
        if(!r.ok) throw new Error("missing");
        return r.text();
      });
      const rows = parseCSV(txt); // from BLOCK 3
      const header = rows[0].map(h=>String(h).toLowerCase().trim());
      const idIdx = header.indexOf("item_id");
      const labelIdx = header.indexOf("label");
      const activeIdx = header.indexOf("active");

      this.items = rows.slice(1).map(r=>({
        id: String(r[idIdx]||"").trim(),
        label: String(r[labelIdx]||"").trim(),
        active: String(r[activeIdx]||"true").trim().toLowerCase() !== "false"
      })).filter(x=>x.id && x.label && x.active);

    }catch(e){
      console.warn("[checklist] checklist_items.csv missing/invalid, using none", e);
      this.items = [];
    }
    this.loaded = true;
    return this.items;
  }
};

/* ------------------ Completion + status rules ------------------ */
function openIssueCount(storeId){
  const st = ensureStore(storeId);
  return st.issues.filter(i=>!i.resolved).length;
}
function hasOpenIssues(storeId){
  return openIssueCount(storeId) > 0;
}

function completion(storeId){
  const st = ensureStore(storeId);
  const dyn = ChecklistSchema.items;
  const total = 3 + dyn.length;
  let done = 0;

  if(st.watered && st.wateredOn === todayKey()) done++;
  if(st.negatives) done++;
  if(st.pictures) done++;

  dyn.forEach(it=>{
    if(st.checklist[it.id] === true) done++;
  });

  const pct = total ? done/total : 0;
  return { done, total, pct };
}

/* Marker color:
   - If open issues: yellow + red flag
   - else pct < .5 red
   - pct >= .5 yellow
   - pct == 1 green
*/
function storeStatus(storeId){
  if(hasOpenIssues(storeId)) return "warn";
  const { pct } = completion(storeId);
  if(pct >= 1) return "ok";
  if(pct >= 0.5) return "warn";
  return "bad";
}

/* ------------------ Marker indexing (no map overrides) ------------------ */
/* We locate markers by matching their lat/lon to store lat/lon */
const MarkerIndex = {
  built: false,
  byStoreId: new Map(),

  build(){
    if(!window.MAP || !window.AppStores?.length) return;
    this.byStoreId.clear();

    // Collect all markers currently on map
    const layers = [];
    window.MAP.eachLayer(layer=>{
      if(layer && typeof layer.getLatLng === "function") layers.push(layer);
    });

    for(const s of window.AppStores){
      const match = layers.find(m=>{
        const ll = m.getLatLng();
        return Math.abs(ll.lat - s.lat) < 1e-6 && Math.abs(ll.lng - s.lon) < 1e-6;
      });
      if(match) this.byStoreId.set(s.id, match);
    }
    this.built = true;
  },

  get(storeId){
    return this.byStoreId.get(storeId);
  }
};

/* Build marker index after map init */
setTimeout(()=> MarkerIndex.build(), 400);

/* ------------------ Apply marker HTML (color + flag) ------------------ */
function markerHtml(storeId){
  const status = storeStatus(storeId);
  const flag = hasOpenIssues(storeId);

  const cls = status === "ok" ? "pin-ok" : status === "warn" ? "pin-warn" : "pin-bad";

  return `
    <div class="pin ${cls}">
      ${flag ? `<span class="flagpole"></span>` : ``}
    </div>
  `;
}

function updateMarker(storeId){
  const marker = MarkerIndex.get(storeId);
  if(!marker || !window.L) return;

  const icon = L.divIcon({
    className:"",
    html: markerHtml(storeId),
    iconSize:[18,18],
    iconAnchor:[9,9]
  });
  marker.setIcon(icon);
}

function updateAllMarkers(){
  if(!ChecklistSchema.loaded) return;
  if(!MarkerIndex.built) MarkerIndex.build();
  for(const s of (window.AppStores||[])){
    ensureStore(s.id);
    updateMarker(s.id);
  }
}

/* ------------------ Checklist UI injection ------------------ */
function ensureChecklistBox(){
  if(document.getElementById("checklistBox")) return;

  const panel = document.querySelector(".store-panel");
  if(!panel) return;

  const box = document.createElement("div");
  box.id = "checklistBox";
  box.className = "checklist-box";
  box.innerHTML = `
    <div class="checklist-title">Checklist</div>
    <div id="checklistRows"></div>
    <div class="checklist-meta">
      <div>Completion: <strong id="checkPct">0%</strong></div>
      <div id="checkCount">0/0</div>
    </div>
  `;

  // insert before Add Issue button
  const addIssueBtn = document.getElementById("btnAddIssue");
  panel.insertBefore(box, addIssueBtn);
}

/* Render checklist for selected store */
function renderChecklist(storeId){
  ensureChecklistBox();
  const st = ensureStore(storeId);

  const rowsEl = document.getElementById("checklistRows");
  const pctEl = document.getElementById("checkPct");
  const countEl = document.getElementById("checkCount");
  if(!rowsEl || !pctEl || !countEl) return;

  const dyn = ChecklistSchema.items;
  const { done, total, pct } = completion(storeId);
  pctEl.textContent = `${Math.round(pct*100)}%`;
  countEl.textContent = `${done}/${total}`;

  const row = (key, label, checked) => `
    <label class="checklist-row">
      <input type="checkbox" data-ck="${key}" ${checked ? "checked" : ""} />
      <span>${esc(label)}</span>
    </label>
  `;

  rowsEl.innerHTML = [
    row("watered", "Watered (resets daily)", st.watered && st.wateredOn === todayKey()),
    row("negatives", "Negatives", !!st.negatives),
    row("pictures", "Pictures", !!st.pictures),
    ...dyn.map(it=>row("dyn:"+it.id, it.label, st.checklist[it.id] === true))
  ].join("");

  rowsEl.onchange = (e)=>{
    const cb = e.target.closest("input[data-ck]");
    if(!cb) return;
    const key = cb.getAttribute("data-ck");

    if(key === "watered"){
      st.watered = cb.checked;
      st.wateredOn = cb.checked ? todayKey() : null;
    } else if(key === "negatives"){
      st.negatives = cb.checked;
    } else if(key === "pictures"){
      st.pictures = cb.checked;
    } else if(key.startsWith("dyn:")){
      const id = key.slice(4);
      st.checklist[id] = cb.checked;
    }

    st.updatedAt = Date.now();
    StoreState[storeId] = st;
    saveState();

    // update side stats in panel
    document.getElementById("spWatered").textContent = (st.watered && st.wateredOn===todayKey()) ? "✅" : "❌";
    document.getElementById("spNegatives").textContent = st.negatives ? "⚠️" : "✅";
    document.getElementById("spIssues").textContent = openIssueCount(storeId) ? `🚩 ${openIssueCount(storeId)}` : "✅ None";

    // update checklist + marker
    renderChecklist(storeId);
    updateMarker(storeId);
    renderViewIssuesButton(storeId);
  };
}

/* ------------------ Issues UI: View button + modal ------------------ */
function ensureIssuesModal(){
  if(document.getElementById("issuesModalBackdrop")) return;

  const bd = document.createElement("div");
  bd.id = "issuesModalBackdrop";
  bd.className = "modal-backdrop";
  bd.innerHTML = `
    <div class="modal">
      <h2>Store Issues</h2>
      <div class="sub" id="issuesStoreLabel"></div>
      <div id="issuesList"></div>
      <div class="modal-actions">
        <button class="btn" id="issuesCloseBtn" type="button">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(bd);

  const close = ()=> bd.style.display="none";
  document.getElementById("issuesCloseBtn").onclick = close;
  bd.onclick = (e)=>{ if(e.target === bd) close(); };
}

function renderViewIssuesButton(storeId){
  // Create the button if missing
  let btn = document.getElementById("btnViewIssues");
  if(!btn){
    btn = document.createElement("button");
    btn.id = "btnViewIssues";
    btn.className = "small-btn";
    btn.textContent = "🚩 View Issues";
    btn.style.display = "none";

    const panel = document.querySelector(".store-panel");
    const addIssue = document.getElementById("btnAddIssue");
    panel.insertBefore(btn, addIssue.nextSibling);
  }

  const st = ensureStore(storeId);
  btn.style.display = st.issues.length ? "inline-block" : "none";
  btn.onclick = ()=> openIssuesModal(storeId);
}

function openIssuesModal(storeId){
  ensureIssuesModal();

  const store = (window.AppStores||[]).find(s=>s.id===storeId);
  document.getElementById("issuesStoreLabel").textContent =
    store ? `${store.name} (${store.id})` : `Store ${storeId}`;

  const st = ensureStore(storeId);
  const list = document.getElementById("issuesList");

  if(!st.issues.length){
    list.innerHTML = `<div class="issue-card">No issues reported.</div>`;
  } else {
    list.innerHTML = st.issues.map(issue=>`
      <div class="issue-card">
        <div class="issue-top">
          <div>${esc(issue.text)}</div>
          <div class="${issue.resolved ? "issue-status-done" : "issue-status-open"}">
            ${issue.resolved ? "Resolved" : "Open"}
          </div>
        </div>
        <div class="issue-meta">
          Reported by ${esc(issue.createdBy)} • ${new Date(issue.createdAt).toLocaleString()}
        </div>
        ${!issue.resolved ? `<button class="small-btn" data-resolve="${issue.id}" style="margin-top:8px;">✅ Mark Resolved</button>` : ``}
      </div>
    `).join("");
  }

  list.onclick = (e)=>{
    const btn = e.target.closest("[data-resolve]");
    if(!btn) return;

    const id = btn.getAttribute("data-resolve");
    const issue = st.issues.find(i=>i.id===id);
    if(!issue) return;

    issue.resolved = true;
    st.updatedAt = Date.now();
    StoreState[storeId] = st;
    saveState();

    // update UI + marker (issues override)
    updateMarker(storeId);
    renderChecklist(storeId);
    renderViewIssuesButton(storeId);
    document.getElementById("spIssues").textContent = openIssueCount(storeId) ? `🚩 ${openIssueCount(storeId)}` : "✅ None";

    openIssuesModal(storeId); // re-render modal
  };

  document.getElementById("issuesModalBackdrop").style.display = "flex";
}

/* ------------------ Add Issue button wiring ------------------ */
function wireAddIssue(storeId){
  const btn = document.getElementById("btnAddIssue");
  if(!btn) return;

  btn.disabled = false;
  btn.onclick = ()=>{
    const st = ensureStore(storeId);
    const msg = prompt("Enter issue details:");
    if(!msg) return;

    st.issues.push({
      id: uuid(),
      text: msg.trim(),
      createdAt: Date.now(),
      createdBy: App.user?.username || "User",
      resolved: false
    });

    st.updatedAt = Date.now();
    StoreState[storeId] = st;
    saveState();

    // issue override forces yellow + flag
    updateMarker(storeId);
    renderViewIssuesButton(storeId);
    renderChecklist(storeId);
    document.getElementById("spIssues").textContent = `🚩 ${openIssueCount(storeId)}`;
  };
}

/* ------------------ Hook store selection from BLOCK 4 ------------------ */
/* We detect selected store via window.SelectedStore set in BLOCK 4 */
let lastSelectedId = null;
setInterval(()=>{
  const s = window.SelectedStore;
  if(!s || !s.id) return;
  if(s.id === lastSelectedId) return;

  lastSelectedId = s.id;

  // Ensure schema loaded and render UI
  ChecklistSchema.load().then(()=>{
    ensureStore(s.id);

    // Update panel quick status fields
    const st = ensureStore(s.id);
    document.getElementById("spWatered").textContent = (st.watered && st.wateredOn===todayKey()) ? "✅" : "❌";
    document.getElementById("spNegatives").textContent = st.negatives ? "⚠️" : "✅";
    document.getElementById("spIssues").textContent = openIssueCount(s.id) ? `🚩 ${openIssueCount(s.id)}` : "✅ None";

    renderChecklist(s.id);
    wireAddIssue(s.id);
    renderViewIssuesButton(s.id);

    // marker refresh for this store
    updateMarker(s.id);
  });
}, 250);

/* ------------------ Init on load: schema + marker refresh ------------------ */
ChecklistSchema.load().then(()=>{
  // Once markers exist, rebuild marker index & refresh colors
  setTimeout(()=>{
    MarkerIndex.build();
    updateAllMarkers();
  }, 600);
});
</script>
<script>
/* ======================================================
   BLOCK 6 — HF / HPA / TRAINING + FINAL BOOT
   ====================================================== */

/* ------------------ Small helpers ------------------ */
function esc(s){
  return String(s ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

/* ------------------ HF / HPA tab toggles ------------------ */
document.querySelectorAll("[data-hf-tab]").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll("[data-hf-tab]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const t = btn.dataset.hfTab;
    document.getElementById("hf-guidelines").classList.toggle("hidden", t!=="guidelines");
    document.getElementById("hf-care").classList.toggle("hidden", t!=="care");
  };
});

document.querySelectorAll("[data-hf-care]").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll("[data-hf-care]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("hf-plants").classList.toggle("hidden", btn.dataset.hfCare!=="plants");
    document.getElementById("hf-pests").classList.toggle("hidden", btn.dataset.hfCare!=="pests");
  };
});

document.querySelectorAll("[data-hpa-tab]").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll("[data-hpa-tab]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const t = btn.dataset.hpaTab;
    document.getElementById("hpa-guidelines").classList.toggle("hidden", t!=="guidelines");
    document.getElementById("hpa-products").classList.toggle("hidden", t!=="products");
    document.getElementById("hpa-care").classList.toggle("hidden", t!=="care");
  };
});

document.querySelectorAll("[data-hpa-care]").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll("[data-hpa-care]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("hpa-plants").classList.toggle("hidden", btn.dataset.hpaCare!=="plants");
    document.getElementById("hpa-pests").classList.toggle("hidden", btn.dataset.hpaCare!=="pests");
  };
});

/* ------------------ Simple CSV loader ------------------ */
async function loadCsvSafe(url){
  try{
    const r = await fetch(url, { cache:"no-store" });
    if(!r.ok) throw new Error("missing");
    return parseCSV(await r.text());
  }catch{
    return null;
  }
}

/* ------------------ HF / HPA Guidelines ------------------ */
async function renderGuidelines(csvUrl, mountId){
  const mount = document.getElementById(mountId);
  if(!mount) return;

  const rows = await loadCsvSafe(csvUrl);
  if(!rows || rows.length < 2){
    mount.innerHTML = `<div class="bubble-soft">No guidelines available.</div>`;
    return;
  }

  const header = rows[0].map(h=>h.toLowerCase());
  const catIdx = header.indexOf("category") >= 0 ? header.indexOf("category") : 0;
  const txtIdx = header.indexOf("text") >= 0 ? header.indexOf("text") : 1;

  const groups = {};
  rows.slice(1).forEach(r=>{
    const c = r[catIdx] || "General";
    const t = r[txtIdx];
    if(!t) return;
    if(!groups[c]) groups[c] = [];
    groups[c].push(t);
  });

  mount.innerHTML = Object.entries(groups).map(([cat,items])=>`
    <div class="bubble-soft">
      <div class="bubble-title">${esc(cat)}</div>
      <ul style="margin-left:16px;">
        ${items.map(i=>`<li>${esc(i)}</li>`).join("")}
      </ul>
    </div>
  `).join("");
}

/* ------------------ Plants / Pests (name-only) ------------------ */
function renderNameCards(list, mountId, title){
  const mount = document.getElementById(mountId);
  if(!mount) return;

  mount.innerHTML = list.map(x=>`
    <div class="bubble-soft" style="cursor:pointer;">
      <strong>${esc(x.name)}</strong>
      <div class="bubble-sub">${esc(title)}</div>
    </div>
  `).join("");
}

/* ------------------ Load HF ------------------ */
async function loadHF(){
  await renderGuidelines("hf_guidelines.csv", "hf-guidelines");
  renderNameCards(
    [{name:"Ferns"},{name:"Palms"},{name:"Succulents"}],
    "hf-plants",
    "Plant Care"
  );
  renderNameCards(
    [{name:"Aphids"},{name:"Spider Mites"}],
    "hf-pests",
    "Pest Info"
  );
}

/* ------------------ Load HPA ------------------ */
async function loadHPA(){
  await renderGuidelines("hpa_guidelines.csv", "hpa-guidelines");
  renderNameCards(
    [{name:"Annuals"},{name:"Perennials"}],
    "hpa-plants",
    "Plant Care"
  );
  renderNameCards(
    [{name:"Thrips"},{name:"Mealybugs"}],
    "hpa-pests",
    "Pest Info"
  );

  document.getElementById("products-skus").innerHTML =
    `<div class="bubble-soft">SKU Catalogue will render here.</div>`;
  document.getElementById("products-orders").innerHTML =
    `<div class="bubble-soft">Order Breakdown will render here.</div>`;
}

/* ------------------ Training tab ------------------ */
document.querySelectorAll("[data-train]").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll("[data-train]").forEach(b=>b.classList.remove("primary"));
    btn.classList.add("primary");
    ["basics","merch","supervisor"].forEach(k=>{
      document.getElementById("train-"+k).classList.toggle("hidden", btn.dataset.train!==k);
    });
  };
});

/* ------------------ Nav hooks ------------------ */
document.querySelectorAll(".nav-link").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    if(btn.dataset.view === "hf") loadHF();
    if(btn.dataset.view === "hpa") loadHPA();
  });
});

/* ------------------ Final boot sanity ------------------ */
console.log("✅ HUB fully initialized (login, map, checklist, HF/HPA ready)");
</script>
